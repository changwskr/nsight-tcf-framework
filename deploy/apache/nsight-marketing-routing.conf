# NSIGHT TCF Framework Apache routing sample
# Domain: nh.marketing.com

ServerTokens Prod
ServerSignature Off
TraceEnable Off
Timeout 30
KeepAlive On
KeepAliveTimeout 5
MaxKeepAliveRequests 100

ProxyRequests Off
ProxyPreserveHost On
ProxyTimeout 10
RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Port  "443"

<Proxy "balancer://nsight-tcf-cluster">
    BalancerMember "http://nsight-ap01:8080" route=ap01 retry=5 connectiontimeout=3 timeout=10
    BalancerMember "http://nsight-ap02:8080" route=ap02 retry=5 connectiontimeout=3 timeout=10
    ProxySet lbmethod=byrequests
    ProxySet stickysession=JSESSIONID|jsessionid
    ProxySet failontimeout=On
</Proxy>

<VirtualHost *:443>
    ServerName nh.marketing.com
    SSLEngine on
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    ProxyPass /cc/ balancer://nsight-tcf-cluster/cc/
    ProxyPassReverse /cc/ balancer://nsight-tcf-cluster/cc/
    ProxyPass /ic/ balancer://nsight-tcf-cluster/ic/
    ProxyPassReverse /ic/ balancer://nsight-tcf-cluster/ic/
    ProxyPass /pc/ balancer://nsight-tcf-cluster/pc/
    ProxyPassReverse /pc/ balancer://nsight-tcf-cluster/pc/
    ProxyPass /bc/ balancer://nsight-tcf-cluster/bc/
    ProxyPassReverse /bc/ balancer://nsight-tcf-cluster/bc/
    ProxyPass /ms/ balancer://nsight-tcf-cluster/ms/
    ProxyPassReverse /ms/ balancer://nsight-tcf-cluster/ms/
    ProxyPass /sv/ balancer://nsight-tcf-cluster/sv/
    ProxyPassReverse /sv/ balancer://nsight-tcf-cluster/sv/
    ProxyPass /pd/ balancer://nsight-tcf-cluster/pd/
    ProxyPassReverse /pd/ balancer://nsight-tcf-cluster/pd/
    ProxyPass /cm/ balancer://nsight-tcf-cluster/cm/
    ProxyPassReverse /cm/ balancer://nsight-tcf-cluster/cm/
    ProxyPass /eb/ balancer://nsight-tcf-cluster/eb/
    ProxyPassReverse /eb/ balancer://nsight-tcf-cluster/eb/
    ProxyPass /ep/ balancer://nsight-tcf-cluster/ep/
    ProxyPassReverse /ep/ balancer://nsight-tcf-cluster/ep/
    ProxyPass /bp/ balancer://nsight-tcf-cluster/bp/
    ProxyPassReverse /bp/ balancer://nsight-tcf-cluster/bp/
    ProxyPass /bd/ balancer://nsight-tcf-cluster/bd/
    ProxyPassReverse /bd/ balancer://nsight-tcf-cluster/bd/
    ProxyPass /ss/ balancer://nsight-tcf-cluster/ss/
    ProxyPassReverse /ss/ balancer://nsight-tcf-cluster/ss/
    ProxyPass /cs/ balancer://nsight-tcf-cluster/cs/
    ProxyPassReverse /cs/ balancer://nsight-tcf-cluster/cs/
    ProxyPass /ct/ balancer://nsight-tcf-cluster/ct/
    ProxyPassReverse /ct/ balancer://nsight-tcf-cluster/ct/
    ProxyPass /mg/ balancer://nsight-tcf-cluster/mg/
    ProxyPassReverse /mg/ balancer://nsight-tcf-cluster/mg/
    ProxyPass /om/ balancer://nsight-tcf-cluster/om/
    ProxyPassReverse /om/ balancer://nsight-tcf-cluster/om/
</VirtualHost>
