# sv-service Secret — credentials and sensitive values
#
# Replace CHANGE_ME values before apply (or create via kubectl/sealed-secrets).
#
# Apply:
#   kubectl apply -f sv-service/scripts/k8s/secret.yaml
#
# Prefer (not committing real secrets):
#   kubectl -n nsight create secret generic nsight-sv-secret \
#     --from-literal=NSIGHT_SV_DB_USER=svuser \
#     --from-literal=NSIGHT_SV_DB_PASSWORD='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: nsight-sv-secret
  namespace: nsight
  labels:
    app: nsight-sv
    app.kubernetes.io/name: sv-service
    app.kubernetes.io/part-of: nsight-tcf-framework
type: Opaque
stringData:
  # Business DB (application-prod.yml)
  NSIGHT_SV_DB_USER: "CHANGE_ME"
  NSIGHT_SV_DB_PASSWORD: "CHANGE_ME"
  # Transaction log DB
  NSIGHT_TXLOG_DB_USER: "sa"
  NSIGHT_TXLOG_DB_PASSWORD: ""
