server:
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    # Gateway는 세션을 소유하지 않음 — SESSIONDB 쿠키만 검증·전달
    session:
      tracking-modes: []

spring:
  profiles:
    default: local
  application:
    name: nsight-gateway
  session:
    store-type: none
  datasource:
    url: jdbc:h2:file:./data/gateway-route;MODE=Oracle;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      # primary(gateway-route) — sessionDataSource 추가 시 자동탐지가 SESSIONDB로 붙는 것 방지
      settings:
        web-allow-others: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

nsight:
  gateway:
    auth:
      login-required: true
      session-validation:
        spring-session-check: true
        user-session-check: true
        header-user-check: true
        header-user-strict: false
    user-session-sync:
      enabled: true
      fixed-rate-ms: 10000
