<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway 거래로그 조회</title>
  <link rel="stylesheet" href="/admin/routes.css">
</head>
<body>
  <nav class="admin-nav">
    <a href="/admin/routes.html">라우팅 테이블</a>
    <a href="/admin/transaction-log.html">거래로그</a>
    <a href="/admin/sessions.html">세션</a>
  </nav>

  <header class="page-header">
    <div>
      <h1>Gateway 거래로그</h1>
      <p class="subtitle">TCF_GATEWAY_TX_LOG — 프록시 경유 거래 추적 (GUID · TraceId · ServiceId)</p>
    </div>
    <div class="header-meta">
      <span id="currentEnvBadge" class="badge">-</span>
      <button type="button" id="btnRefresh" class="btn secondary">새로고침</button>
    </div>
  </header>

  <section class="alert info">
    Gateway 관문을 경유한 온라인 전문만 기록됩니다. OM <code>TCF_TX_LOG</code>와 별도입니다. 행을 클릭하면 상세를 확인할 수 있습니다.
  </section>

  <section class="toolbar card">
    <div class="field">
      <label for="filterBusinessCode">업무</label>
      <select id="filterBusinessCode">
        <option value="">전체</option>
      </select>
    </div>
    <div class="field">
      <label for="filterGuid">GUID</label>
      <input id="filterGuid" type="text" placeholder="전체">
    </div>
    <div class="field">
      <label for="filterTraceId">TraceId</label>
      <input id="filterTraceId" type="text">
    </div>
    <div class="field">
      <label for="filterServiceId">ServiceId</label>
      <input id="filterServiceId" type="text">
    </div>
    <div class="field">
      <label for="filterTransactionCode">거래코드</label>
      <input id="filterTransactionCode" type="text">
    </div>
    <div class="field">
      <label for="filterUserId">UserId</label>
      <input id="filterUserId" type="text">
    </div>
    <div class="field">
      <label for="filterBranchId">지점</label>
      <input id="filterBranchId" type="text">
    </div>
    <div class="field">
      <label for="filterResultStatus">결과</label>
      <select id="filterResultStatus">
        <option value="">전체</option>
        <option value="SUCCESS">SUCCESS</option>
        <option value="FAIL">FAIL</option>
        <option value="ERROR">ERROR</option>
      </select>
    </div>
    <div class="field">
      <label for="filterErrorCode">오류코드</label>
      <input id="filterErrorCode" type="text">
    </div>
    <div class="field">
      <label for="filterFromDate">시작일시</label>
      <input id="filterFromDate" type="text" placeholder="2026-06-14T00:00:00+09:00">
    </div>
    <div class="field">
      <label for="filterToDate">종료일시</label>
      <input id="filterToDate" type="text">
    </div>
    <div class="toolbar-actions">
      <button type="button" id="btnSearch" class="btn primary">조회</button>
      <button type="button" id="btnReset" class="btn secondary">초기화</button>
      <button type="button" id="btnDeleteAll" class="btn danger">전체 로그 삭제</button>
    </div>
  </section>

  <section class="summary-bar card" id="summaryBar">
    <span class="stat-pill">조회 후 집계가 표시됩니다</span>
  </section>

  <div class="list-status" id="listStatus">-</div>

  <div class="grid-2">
    <section class="card">
      <div class="card-head">거래로그 목록</div>
      <div class="table-wrap">
        <table id="txTable">
          <thead>
            <tr>
              <th>일시</th>
              <th>업무</th>
              <th>ServiceId</th>
              <th>거래코드</th>
              <th>GUID</th>
              <th>TraceId</th>
              <th>사용자</th>
              <th>결과</th>
              <th>처리시간</th>
              <th>오류</th>
            </tr>
          </thead>
          <tbody id="txTableBody">
            <tr><td colspan="10" class="empty">조회 버튼을 누르세요.</td></tr>
          </tbody>
        </table>
        <div class="pagination" id="pagination" hidden></div>
      </div>
    </section>

    <section class="card detail-panel" id="detailPanel" hidden>
      <div class="card-head">거래 상세</div>
      <div class="card-body empty-hint">목록에서 행을 선택하세요.</div>
    </section>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/admin/transaction-log.js"></script>
</body>
</html>
