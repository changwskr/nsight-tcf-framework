<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EB 사용자 관리</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/eb-admin.css">
</head>
<body>
  <div class="eb-admin-wrap">
    <header>
      <h1>EB 사용자 관리</h1>
      <p>EBM 사용자 등록 및 목록 조회 · 등록 시 <code>EB_EVENT(READY)</code>가 생성되어 EP로 전송됩니다.</p>
      <div class="nav-links">
        <a class="nav-link" href="/index.html">← 업무 목록</a>
        <a class="nav-link" href="/eb/index.html">EB 거래 테스트</a>
        <a class="nav-link" href="/eb/system-tx-status.html">시스템 거래 현황(19410)</a>
        <a class="nav-link" href="/eb/event-monitor.html">이벤트·배치 모니터</a>
      </div>
    </header>

    <section class="eb-meta-bar">
      <div class="eb-meta-card">
        <div class="label">연결 대상</div>
        <div class="value" id="metaTargetUrl">-</div>
      </div>
      <div class="eb-meta-card">
        <div class="label">조회 거래</div>
        <div class="value">EB.User.inquiry (EB-USR-0002)</div>
      </div>
      <div class="eb-meta-card">
        <div class="label">등록 거래</div>
        <div class="value">EB.User.create (EB-USR-0001)</div>
      </div>
    </section>

    <section class="eb-form-panel">
      <h2>사용자 등록</h2>
      <div class="eb-form-grid">
        <div class="field">
          <label for="createUserId">사용자 ID *</label>
          <input id="createUserId" type="text" placeholder="U001" maxlength="50">
        </div>
        <div class="field">
          <label for="createUserName">사용자 이름 *</label>
          <input id="createUserName" type="text" placeholder="홍길동" maxlength="100">
        </div>
        <div class="field">
          <label for="createBranchId">지점 ID</label>
          <input id="createBranchId" type="text" placeholder="001" maxlength="20">
        </div>
      </div>
      <div class="eb-actions">
        <button type="button" class="btn-primary" id="btnCreate">등록</button>
        <button type="button" class="btn-secondary" id="btnResetForm">입력 초기화</button>
      </div>
      <div id="createAlert" class="eb-alert" hidden></div>
    </section>

    <section class="eb-filter-bar">
      <div class="field">
        <label for="filterUserId">사용자 ID</label>
        <input id="filterUserId" type="text" placeholder="부분 일치">
      </div>
      <div class="field">
        <label for="filterUserName">사용자 이름</label>
        <input id="filterUserName" type="text" placeholder="부분 일치">
      </div>
      <div class="field">
        <label for="filterBranchId">지점 ID</label>
        <input id="filterBranchId" type="text" placeholder="정확히 일치">
      </div>
      <div class="eb-actions">
        <button type="button" class="btn-primary" id="btnSearch">조회</button>
        <button type="button" class="btn-secondary" id="btnClearFilter">필터 초기화</button>
      </div>
    </section>

    <section class="eb-table-panel">
      <h2>사용자 목록</h2>
      <div class="eb-table-wrap">
        <table class="eb-table">
          <thead>
            <tr>
              <th>사용자 ID</th>
              <th>이름</th>
              <th>지점</th>
              <th>등록일시</th>
              <th>최근 이벤트</th>
              <th>이벤트 상태</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="6" class="eb-empty">조회 중...</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" class="eb-pagination" hidden></div>
    </section>
  </div>

  <script src="/_shared/ui-context.js"></script>
  <script src="/_shared/eb-admin.js"></script>
  <script>
    const PAGE_SIZE = 15;
    let pageNo = 1;

    function readFilters() {
      const v = id => document.getElementById(id).value.trim();
      const filters = { pageNo, pageSize: PAGE_SIZE };
      if (v('filterUserId')) filters.userId = v('filterUserId');
      if (v('filterUserName')) filters.userName = v('filterUserName');
      if (v('filterBranchId')) filters.branchId = v('filterBranchId');
      return filters;
    }

    function renderRows(rows) {
      const tbody = document.getElementById('userTableBody');
      if (!rows || rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="eb-empty">등록된 사용자가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(row => {
        const userId = EbAdmin.field(row, 'userId');
        const userName = EbAdmin.field(row, 'userName');
        const branchId = EbAdmin.field(row, 'branchId');
        const createdAt = EbAdmin.formatTs(EbAdmin.field(row, 'createdAt'));
        const eventId = EbAdmin.field(row, 'eventId', '-');
        const eventType = EbAdmin.field(row, 'eventType', '-');
        const eventStatus = EbAdmin.field(row, 'eventStatus', '-');
        const eventLabel = eventId === '-' ? '-' : `${eventType} · <span class="mono">${eventId}</span>`;
        return `
          <tr>
            <td><strong>${userId}</strong></td>
            <td>${userName}</td>
            <td>${branchId}</td>
            <td>${createdAt}</td>
            <td>${eventLabel}</td>
            <td>${EbAdmin.chipForEventStatus(eventStatus)}</td>
          </tr>`;
      }).join('');
    }

    async function loadUsers(nextPage) {
      if (nextPage != null) pageNo = nextPage;
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '<tr><td colspan="6" class="eb-empty">조회 중...</td></tr>';
      try {
        const { body } = await EbAdmin.inquiry('userInquiry', readFilters());
        const rows = body.rows || [];
        renderRows(rows);
        EbAdmin.renderPagination(
          document.getElementById('pagination'),
          body.pageNo || pageNo,
          body.pageSize || PAGE_SIZE,
          body.totalCount || 0,
          loadUsers
        );
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="6" class="eb-empty">${error.message || '조회 실패'}</td></tr>`;
        document.getElementById('pagination').hidden = true;
      }
    }

    async function createUser() {
      const userId = document.getElementById('createUserId').value.trim();
      const userName = document.getElementById('createUserName').value.trim();
      const branchId = document.getElementById('createBranchId').value.trim();
      const alertEl = document.getElementById('createAlert');

      if (!userId || !userName) {
        EbAdmin.showAlert(alertEl, '사용자 ID와 이름은 필수입니다.', 'fail');
        return;
      }

      EbAdmin.hideAlert(alertEl);
      try {
        const { body } = await EbAdmin.mutate('userCreate', { userId, userName, branchId: branchId || null }, 'CREATE');
        EbAdmin.showAlert(
          alertEl,
          `등록 완료: ${body.userId} (${body.userName}) · 이벤트 ${body.eventId} [${body.eventStatus}]`,
          'ok'
        );
        document.getElementById('createUserId').value = '';
        document.getElementById('createUserName').value = '';
        document.getElementById('createBranchId').value = '';
        pageNo = 1;
        await loadUsers(1);
      } catch (error) {
        EbAdmin.showAlert(alertEl, error.message || '등록 실패', 'fail');
      }
    }

    function resetForm() {
      document.getElementById('createUserId').value = '';
      document.getElementById('createUserName').value = '';
      document.getElementById('createBranchId').value = '';
      EbAdmin.hideAlert(document.getElementById('createAlert'));
    }

    function clearFilter() {
      document.getElementById('filterUserId').value = '';
      document.getElementById('filterUserName').value = '';
      document.getElementById('filterBranchId').value = '';
      pageNo = 1;
      loadUsers(1);
    }

    document.getElementById('btnCreate').addEventListener('click', createUser);
    document.getElementById('btnResetForm').addEventListener('click', resetForm);
    document.getElementById('btnSearch').addEventListener('click', () => loadUsers(1));
    document.getElementById('btnClearFilter').addEventListener('click', clearFilter);
    ['filterUserId', 'filterUserName', 'filterBranchId'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') loadUsers(1);
      });
    });
    ['createUserId', 'createUserName', 'createBranchId'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') createUser();
      });
    });

    EbAdmin.loadConfig()
      .then(() => {
        document.getElementById('metaTargetUrl').textContent = EbAdmin.getTargetUrl();
        return loadUsers(1);
      })
      .catch(error => {
        if (window.NsightErrorPopup) {
          NsightErrorPopup.show(NsightErrorPopup.fromError(error, { systemNote: 'EB 사용자 관리' }));
        } else {
          alert('화면 초기화 실패: ' + error.message);
        }
      });
  </script>
</body>
</html>
