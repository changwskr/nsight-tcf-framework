<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT JWK 공개키</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
  <link rel="stylesheet" href="/_shared/jwt-admin.css">
</head>
<body>
  <script src="/_shared/jwt-admin.js?v=20260705a"></script>
  <script>
    async function renderJwks(container) {
      const jwksUrl = JwtAdmin.resolveJwksUrl();
      container.innerHTML = `
        <div class="om-card">
          <div class="om-card-head">JWK Set 엔드포인트</div>
          <div class="om-card-body">
          <p>Resource Server가 RS256 서명 검증에 사용하는 공개키입니다.</p>
          <p><code id="jwksUrl">${jwksUrl}</code></p>
          <div class="jwt-actions">
            <button type="button" class="btn-primary" id="btnReload">다시 조회</button>
            <button type="button" class="btn-secondary" id="btnOpen">새 탭에서 열기</button>
          </div>
          </div>
        </div>
        <div class="om-card">
          <div class="om-card-head">응답 JSON</div>
          <div class="om-card-body">
          <div id="jwksResult" class="jwt-token-box"><pre>조회 중...</pre></div>
          </div>
        </div>`;

      async function load() {
        const resultEl = document.getElementById('jwksResult');
        resultEl.innerHTML = '<pre>조회 중...</pre>';
        try {
          const { url, data } = await JwtAdmin.fetchJwks();
          document.getElementById('jwksUrl').textContent = url;
          resultEl.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        } catch (err) {
          resultEl.innerHTML = `<pre class="om-alert error">${err.message || '조회 실패'}</pre>`;
        }
      }

      document.getElementById('btnReload').addEventListener('click', load);
      document.getElementById('btnOpen').addEventListener('click', () => {
        window.open(JwtAdmin.resolveJwksUrl(), '_blank');
      });
      await load();
    }

    JwtAdmin.initPage('jwks', 'JWK 공개키', renderJwks);
  </script>
</body>
</html>
