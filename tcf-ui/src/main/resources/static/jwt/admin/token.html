<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT 토큰 현황</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
  <link rel="stylesheet" href="/_shared/jwt-admin.css">
</head>
<body>
  <script src="/_shared/jwt-admin.js?v=20260628c"></script>
  <script>
    const PAGE_SIZE = 15;
    let pageNo = 1;
    let pageEl = null;

    function readFilters() {
      const v = id => document.getElementById(id).value.trim();
      const f = {};
      if (v('filterUserId')) f.userId = v('filterUserId');
      if (v('filterJti')) f.jti = v('filterJti');
      if (document.getElementById('filterActive').checked) f.activeOnly = 'Y';
      const revoked = v('filterRevoked');
      if (revoked) f.revokedYn = revoked;
      return f;
    }

    function renderMyTokenPanel() {
      const panel = document.getElementById('myTokenPanel');
      if (!panel) return;
      const session = JwtAdmin.getSession();
      const claims = JwtAdmin.decodeJwtPayload(session.accessToken);
      panel.innerHTML = `
        <div class="jwt-token-grid">
          <div><span class="label">사용자</span><strong>${session.userName || session.userId} (${session.userId})</strong></div>
          <div><span class="label">JTI</span><code class="om-mono">${session.jti || '-'}</code></div>
          <div><span class="label">만료 예상</span><strong>${JwtAdmin.formatExpiry(session)}</strong></div>
          <div><span class="label">Issuer</span><code class="om-mono">${session.issuer || '-'}</code></div>
        </div>
        <div class="jwt-token-box" style="margin-top:12px">
          <div class="om-card-head" style="padding:0 0 8px;border:none">Access Token</div>
          <pre id="accessTokenText">${session.accessToken || '-'}</pre>
        </div>
        <div class="jwt-token-box" style="margin-top:8px">
          <div class="om-card-head" style="padding:0 0 8px;border:none">Refresh Token</div>
          <pre id="refreshTokenText">${session.refreshToken || '-'}</pre>
        </div>
        <div class="jwt-token-box" style="margin-top:8px">
          <div class="om-card-head" style="padding:0 0 8px;border:none">Claims (디코딩)</div>
          <pre>${claims ? JSON.stringify(claims, null, 2) : '-'}</pre>
        </div>
        <p class="jwt-hint" style="margin-top:12px">재발급은 새 Access+Refresh 쌍을 발급합니다. Refresh는 기존 Refresh로 갱신(Rotation)합니다.</p>
        <div class="jwt-actions">
          <button type="button" class="btn-primary" id="btnReissue">토큰 재발급</button>
          <button type="button" class="btn-primary" id="btnRefresh">Refresh 갱신</button>
          <button type="button" class="btn-secondary" id="btnRevokeMine">내 Access 폐기</button>
          <button type="button" class="btn-secondary" id="btnCopyAccess">Access 복사</button>
          <button type="button" class="btn-secondary" id="btnCopyRefresh">Refresh 복사</button>
        </div>
        <div class="jwt-reissue-row" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:end">
          <div class="field" style="margin:0">
            <label for="reissuePassword">재발급 비밀번호</label>
            <input id="reissuePassword" type="password" placeholder="현재 사용자 비밀번호" autocomplete="current-password">
          </div>
        </div>
        <div id="tokenActionResult" class="om-alert" hidden style="margin-top:12px"></div>`;

      document.getElementById('btnReissue').addEventListener('click', () => onReissue());
      document.getElementById('btnRefresh').addEventListener('click', () => onRefresh());
      document.getElementById('btnRevokeMine').addEventListener('click', () => onRevokeMine());
      document.getElementById('btnCopyAccess').addEventListener('click', () => {
        navigator.clipboard.writeText(session.accessToken || '').catch(() => {});
      });
      document.getElementById('btnCopyRefresh').addEventListener('click', () => {
        navigator.clipboard.writeText(session.refreshToken || '').catch(() => {});
      });
      document.getElementById('reissuePassword').addEventListener('keydown', e => {
        if (e.key === 'Enter') onReissue();
      });
    }

    function showTokenActionResult(ok, message) {
      const el = document.getElementById('tokenActionResult');
      if (!el) return;
      el.className = ok ? 'om-alert ok' : 'om-alert error';
      el.textContent = message;
      el.hidden = false;
    }

    async function onReissue() {
      const session = JwtAdmin.getSession();
      const password = document.getElementById('reissuePassword').value;
      if (!password) {
        showTokenActionResult(false, '재발급을 위해 비밀번호를 입력하세요.');
        document.getElementById('reissuePassword').focus();
        return;
      }
      const btn = document.getElementById('btnReissue');
      btn.disabled = true;
      try {
        await JwtAdmin.login(session.userId, password);
        document.getElementById('reissuePassword').value = '';
        renderMyTokenPanel();
        showTokenActionResult(true, '새 Access + Refresh Token이 발급되었습니다.');
        if (pageEl) await loadList(pageEl);
      } catch (e) {
        showTokenActionResult(false, e.message || '재발급 실패');
      } finally {
        btn.disabled = false;
      }
    }

    async function onRefresh() {
      const btn = document.getElementById('btnRefresh');
      btn.disabled = true;
      try {
        await JwtAdmin.refreshTokens();
        renderMyTokenPanel();
        showTokenActionResult(true, 'Refresh Token으로 새 토큰 쌍이 발급되었습니다.');
        if (pageEl) await loadList(pageEl);
      } catch (e) {
        showTokenActionResult(false, e.message || 'Refresh 실패');
      } finally {
        btn.disabled = false;
      }
    }

    async function onRevokeMine() {
      if (!confirm('현재 Access Token을 Denylist에 등록(폐기)합니다. 계속할까요?')) return;
      try {
        await JwtAdmin.revokeAccess('REVOKE');
        showTokenActionResult(true, '현재 Access Token이 폐기되었습니다.');
        if (pageEl) await loadList(pageEl);
      } catch (e) {
        showTokenActionResult(false, e.message || '폐기 실패');
      }
    }

    async function loadList(el) {
      const tbody = document.getElementById('tokenBody');
      tbody.innerHTML = '<tr><td colspan="9" class="om-empty">조회 중...</td></tr>';
      const { body, relay } = await JwtAdmin.inquiry('tokenInquiry', {
        ...readFilters(),
        pageNo,
        pageSize: PAGE_SIZE
      });
      document.getElementById('listStatus').textContent = `${relay.elapsedMs}ms · 총 ${body.totalCount ?? 0}건`;
      const rows = body.rows || [];
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="om-empty">조건에 맞는 토큰이 없습니다.</td></tr>';
      } else {
        tbody.innerHTML = rows.map(r => {
          const jti = JwtAdmin.field(r, 'jti');
          const revoked = JwtAdmin.field(r, 'revokedYn') === 'Y';
          return `
          <tr>
            <td class="om-mono" title="${jti}">${JwtAdmin.shortJti(jti)}</td>
            <td>${JwtAdmin.field(r, 'userId')}</td>
            <td>${JwtAdmin.field(r, 'userName')}</td>
            <td>${JwtAdmin.field(r, 'channelId')}</td>
            <td>${JwtAdmin.formatTs(JwtAdmin.field(r, 'issuedAt'))}</td>
            <td>${JwtAdmin.formatTs(JwtAdmin.field(r, 'expiresAt'))}</td>
            <td>${revoked ? JwtAdmin.chipForResult('REVOKED') : JwtAdmin.chipForResult('ACTIVE')}</td>
            <td>${JwtAdmin.field(r, 'clientIp')}</td>
            <td>${revoked ? '-' : `<button type="button" class="btn-secondary btn-revoke" data-jti="${jti}">폐기</button>`}</td>
          </tr>`;
        }).join('');
        tbody.querySelectorAll('.btn-revoke').forEach(btn => {
          btn.addEventListener('click', async () => {
            const jti = btn.getAttribute('data-jti');
            if (!confirm(`JTI ${jti} 토큰을 강제 폐기할까요?`)) return;
            try {
              await JwtAdmin.adminRevokeByJti(jti, 'ADMIN_REVOKE');
              await loadList(el);
            } catch (e) {
              alert(e.message);
            }
          });
        });
      }
      JwtAdmin.renderPagination(
        document.getElementById('pagination'),
        body.pageNo || pageNo,
        body.pageSize || PAGE_SIZE,
        body.totalCount || 0,
        p => { pageNo = p; loadList(el).catch(e => JwtAdmin.showError(el, e.message)); }
      );
    }

    JwtAdmin.initPage('token', '토큰 현황', async (el) => {
      pageEl = el;
      el.innerHTML = `
        <div class="om-alert info">내 토큰 발급·갱신과 사용자별 Access Token 이력 조회·강제 폐기를 수행합니다.</div>
        <div class="om-card">
          <div class="om-card-head">내 토큰 · 발급 / Refresh</div>
          <div class="om-card-body" id="myTokenPanel"><div class="om-empty">불러오는 중...</div></div>
        </div>
        <section class="om-filter-bar">
          <div class="field"><label for="filterUserId">사용자 ID</label><input id="filterUserId" type="text" placeholder="admin01"></div>
          <div class="field"><label for="filterJti">JTI</label><input id="filterJti" type="text"></div>
          <div class="field"><label for="filterRevoked">폐기여부</label>
            <select id="filterRevoked"><option value="">전체</option><option value="N">유효</option><option value="Y">폐기</option></select>
          </div>
          <div class="field om-filter-check"><label><input id="filterActive" type="checkbox" checked> 유효(미만료)만</label></div>
          <button class="btn-primary" id="searchBtn" type="button">조회</button>
        </section>
        <div style="margin-bottom:10px;color:var(--muted);font-size:0.85rem" id="listStatus">-</div>
        <div class="om-card">
          <div class="om-card-head">토큰 목록 (전체 이력)</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table">
              <thead><tr>
                <th>JTI</th><th>사용자</th><th>이름</th><th>채널</th>
                <th>발급</th><th>만료</th><th>상태</th><th>IP</th><th></th>
              </tr></thead>
              <tbody id="tokenBody"></tbody>
            </table>
            <div class="om-pagination" id="pagination" hidden></div>
          </div>
        </div>
        <div class="om-card">
          <div class="om-card-head">JTI 수동 폐기 (관리자)</div>
          <div class="om-card-body">
            <div class="jwt-actions">
              <input id="revokeJti" type="text" placeholder="JTI" style="min-width:280px">
              <input id="revokeReason" type="text" placeholder="사유 (선택)" style="min-width:160px">
              <button type="button" class="btn-secondary" id="btnManualRevoke">강제 폐기</button>
            </div>
          </div>
        </div>`;

      renderMyTokenPanel();
      document.getElementById('searchBtn').addEventListener('click', () => {
        pageNo = 1;
        loadList(el).catch(e => JwtAdmin.showError(el, e.message));
      });
      document.getElementById('btnManualRevoke').addEventListener('click', async () => {
        const jti = document.getElementById('revokeJti').value.trim();
        if (!jti) { alert('JTI를 입력하세요.'); return; }
        if (!confirm(`JTI ${jti} 를 강제 폐기할까요?`)) return;
        try {
          await JwtAdmin.adminRevokeByJti(jti, document.getElementById('revokeReason').value.trim() || 'ADMIN_REVOKE');
          await loadList(el);
        } catch (e) {
          alert(e.message);
        }
      });
      await loadList(el);
    });
  </script>
</body>
</html>
