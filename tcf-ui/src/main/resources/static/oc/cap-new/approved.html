<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSIGHT OC · 승인된 용량 기준안</title>
  <script src="/_shared/ui-context.js"></script>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/oc-cap-new.css">
</head>
<body class="tcf-home oc-capnew-page">
  <div class="tcf-main">
    <header class="tcf-topbar">
      <div class="tcf-topbar__brand">
        <h1>NSIGHT OC · 승인된 기준안</h1>
        <p>산정 완료 시나리오 확정 · 버전 복제 · 확정 이력</p>
      </div>
      <nav class="tcf-topbar__nav" aria-label="OC 화면">
        <a class="tcf-topbar__link" href="/index.html#moduleSection">TCF UI</a>
        <a class="tcf-topbar__link" href="/oc/index.html">OC 포털</a>
        <a class="tcf-topbar__link" href="/oc/cap-new/index.html">NEW 용량산정</a>
        <a class="tcf-topbar__link" href="/oc/cap-new/compare.html">시나리오 비교</a>
        <a class="tcf-topbar__link tcf-topbar__link--active" href="/oc/cap-new/approved.html">승인 기준안</a>
        <a class="tcf-topbar__link" href="/help.html">HELP</a>
        <span class="badge">CAP-NEW</span>
      </nav>
    </header>

    <section class="tcf-section">
      <div id="capNewMsg" class="oc-capnew-msg" hidden></div>

      <div class="oc-capnew-panel">
        <h2>확정 대기 (COMPLETED)</h2>
        <p>8단계까지 완료된 시나리오를 검토·확정합니다. 운영(PROD)은 검토자가 필요합니다.</p>
        <div id="pendingList" class="oc-capnew-list"><p>로딩 중…</p></div>
      </div>

      <div class="oc-capnew-panel" style="margin-top:1rem;">
        <h2>승인된 기준안 (APPROVED)</h2>
        <div id="approvedList" class="oc-capnew-list"><p>로딩 중…</p></div>
      </div>

      <div class="oc-capnew-panel" style="margin-top:1rem;">
        <h2>확정 이력</h2>
        <table class="oc-capnew-table" id="historyTable">
          <thead><tr><th>일시</th><th>동작</th><th>시나리오</th><th>버전</th><th>판정</th><th>확정자</th><th>검토자</th><th>메모</th></tr></thead>
          <tbody id="historyBody"><tr><td colspan="8">로딩 중…</td></tr></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="/_shared/oc-cap-new-api.js"></script>
  <script src="/_shared/oc-cap-new-export.js"></script>
  <script src="/_shared/oc-cap-new-env-handoff.js"></script>
  <script src="/_shared/oc-cap-new-approved.js"></script>
</body>
</html>
