<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM 공통코드 관리</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
</head>
<body>
  <script src="/_shared/om-admin.js"></script>
  <script>
    async function load(el) {
      const codeGroup = document.getElementById('filterGroup').value;
      const body = codeGroup ? { codeGroup } : {};
      const { body: data } = await OmAdmin.inquiry('commonCode', body);
      const tbody = document.getElementById('codeBody');
      const rows = data.rows || [];
      tbody.innerHTML = rows.length ? rows.map(r => `
        <tr data-group="${OmAdmin.field(r,'codeGroup')}" data-code="${OmAdmin.field(r,'code')}" style="cursor:pointer">
          <td>${OmAdmin.field(r,'codeGroup')}</td><td class="om-mono">${OmAdmin.field(r,'code')}</td>
          <td>${OmAdmin.field(r,'codeName')}</td><td>${OmAdmin.field(r,'sortOrder')}</td>
          <td>${OmAdmin.field(r,'useYn')}</td><td>${OmAdmin.field(r,'description')}</td>
        </tr>`).join('') : '<tr><td colspan="6" class="om-empty">없음</td></tr>';
      tbody.querySelectorAll('tr[data-code]').forEach(tr => tr.addEventListener('click', () => {
        document.getElementById('fGroup').value = tr.dataset.group;
        document.getElementById('fCode').value = tr.dataset.code;
        document.getElementById('fName').value = tr.children[2].textContent;
        document.getElementById('fSort').value = tr.children[3].textContent;
        document.getElementById('fUse').value = tr.children[4].textContent.trim();
        document.getElementById('fDesc').value = tr.children[5].textContent;
      }));
    }

    OmAdmin.initPage('common-code', '공통코드 관리', async (el) => {
      el.innerHTML = `
        <div class="om-alert info">업무코드·채널코드·센터코드 등 기준정보를 조회·저장합니다. 저장 시 변경 사유가 권한이력에 기록됩니다.</div>
        <section class="om-filter-bar">
          <div class="field"><label for="filterGroup">코드그룹</label>
            <select id="filterGroup"><option value="">전체</option><option>BUSINESS_CODE</option><option>CHANNEL_CODE</option><option>CENTER_CODE</option></select>
          </div>
          <button class="btn-primary" id="searchBtn" type="button">조회</button>
        </section>
        <div class="om-form-panel">
          <h3>코드 등록 / 수정</h3>
          <div class="om-form-grid">
            <div class="field"><label for="fGroup">코드그룹</label><input id="fGroup" type="text"></div>
            <div class="field"><label for="fCode">코드</label><input id="fCode" type="text"></div>
            <div class="field"><label for="fName">코드명</label><input id="fName" type="text"></div>
            <div class="field"><label for="fSort">정렬</label><input id="fSort" type="number" value="0"></div>
            <div class="field"><label for="fUse">사용</label><select id="fUse"><option>Y</option><option>N</option></select></div>
            <div class="field field-wide"><label for="fDesc">설명</label><input id="fDesc" type="text"></div>
            <div class="field field-wide"><label for="fReason">변경 사유 (5자+)</label><input id="fReason" type="text" placeholder="승인 후 반영"></div>
          </div>
          <div style="margin-top:12px"><button class="btn-primary" id="saveBtn" type="button">저장</button></div>
        </div>
        <div class="om-card"><div class="om-card-head">공통코드 목록</div><div class="om-card-body om-table-wrap">
          <table class="om-table"><thead><tr><th>그룹</th><th>코드</th><th>명칭</th><th>정렬</th><th>사용</th><th>설명</th></tr></thead>
          <tbody id="codeBody"></tbody></table>
        </div></div>`;
      document.getElementById('searchBtn').addEventListener('click', () => load(el).catch(e => OmAdmin.showError(el, e.message)));
      document.getElementById('saveBtn').addEventListener('click', async () => {
        try {
          const { body } = await OmAdmin.mutate('commonCodeSave', {
            codeGroup: document.getElementById('fGroup').value.trim(),
            code: document.getElementById('fCode').value.trim(),
            codeName: document.getElementById('fName').value.trim(),
            sortOrder: Number(document.getElementById('fSort').value || 0),
            useYn: document.getElementById('fUse').value,
            description: document.getElementById('fDesc').value.trim(),
            changeReason: document.getElementById('fReason').value.trim()
          }, 'UPDATE');
          alert('저장 완료: ' + body.codeGroup + '/' + body.code);
          await load(el);
        } catch (e) { alert(e.message); }
      });
      await load(el);
    });
  </script>
</body>
</html>
