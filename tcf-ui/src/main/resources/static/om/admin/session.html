<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM 세션 관리</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
</head>
<body>
  <script src="/_shared/om-admin.js?v=20260626a"></script>
  <script>
    let pageNo = 1;
    const pageSize = 10;
    let currentSessionId = null;

    function formatEpoch(ms) {
      if (ms == null || ms === '' || ms === '-') return '-';
      const n = Number(ms);
      if (Number.isNaN(n)) return String(ms);
      const d = new Date(n);
      if (Number.isNaN(d.getTime())) return String(ms);
      const pad = v => String(v).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} `
        + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function formatInterval(sec) {
      const n = Number(sec);
      if (Number.isNaN(n)) return '-';
      if (n >= 3600) return `${Math.floor(n / 3600)}시간 ${Math.floor((n % 3600) / 60)}분`;
      if (n >= 60) return `${Math.floor(n / 60)}분`;
      return `${n}초`;
    }

    function shortId(id) {
      if (!id || id === '-') return '-';
      const s = String(id);
      return s.length <= 16 ? s : `${s.slice(0, 8)}…${s.slice(-4)}`;
    }

    async function load(el) {
      try {
        const userId = document.getElementById('filterUserId').value.trim();
        const activeOnly = document.getElementById('filterActive').checked ? 'Y' : 'N';
        const body = { pageNo, pageSize, activeOnly };
        if (userId) body.userId = userId;

        const { body: data } = await OmAdmin.inquiry('session', body);
        currentSessionId = data.currentSession && data.currentSession.sessionId
          ? data.currentSession.sessionId : null;

        document.getElementById('statActive').textContent = data.activeCount ?? 0;
        document.getElementById('statTotal').textContent = data.totalCount ?? 0;

        const cur = data.currentSession || {};
        document.getElementById('mySessionPanel').innerHTML = cur.loggedIn ? `
          <div class="om-session-my-grid">
            <div><span class="label">사용자</span><strong>${cur.userName || cur.userId} (${cur.userId})</strong></div>
            <div><span class="label">지점</span><strong>${cur.branchId || '-'}</strong></div>
            <div><span class="label">권한</span><strong>${cur.authGroupName || cur.authGroupId || '-'}</strong></div>
            <div><span class="label">세션 ID</span><code class="om-mono">${cur.sessionId || '-'}</code></div>
          </div>` : '<div class="om-empty">로그인 세션이 없습니다.</div>';

        const rows = data.rows || [];
        const tbody = document.getElementById('sessionBody');
        const emptyHint = (data.totalCount ?? 0) === 0
          ? '<br><small>DB(<code>SPRING_SESSION</code>)에 세션이 없습니다. tcf-om 재시작 후 다시 로그인하세요.</small>'
          : '';
        tbody.innerHTML = rows.length ? rows.map(r => {
        const sid = OmAdmin.field(r, 'sessionId');
        const isMine = currentSessionId && sid === currentSessionId;
        const active = OmAdmin.field(r, 'activeYn') === 'Y';
        return `
        <tr class="${isMine ? 'om-row-selected' : ''}">
          <td class="om-mono" title="${sid}">${shortId(sid)}${isMine ? ' <span class="om-chip ok">내 세션</span>' : ''}</td>
          <td>${OmAdmin.field(r, 'userId')}</td>
          <td>${OmAdmin.field(r, 'userName')}</td>
          <td>${OmAdmin.field(r, 'branchId')}</td>
          <td>${OmAdmin.field(r, 'authGroupName', OmAdmin.field(r, 'authGroupId'))}</td>
          <td>${formatEpoch(OmAdmin.field(r, 'creationTime'))}</td>
          <td>${formatEpoch(OmAdmin.field(r, 'lastAccessTime'))}</td>
          <td>${formatInterval(OmAdmin.field(r, 'maxInactiveInterval'))}</td>
          <td>${formatEpoch(OmAdmin.field(r, 'expiryTime'))}</td>
          <td>${active ? '<span class="om-chip ok">활성</span>' : '<span class="om-chip muted">만료</span>'}</td>
          <td>${active ? `<button type="button" class="btn-secondary btn-kill" data-id="${sid}">종료</button>` : '-'}</td>
        </tr>`;
      }).join('') : `<tr><td colspan="11" class="om-empty">세션 없음${emptyHint}</td></tr>`;

      tbody.querySelectorAll('.btn-kill').forEach(btn => btn.addEventListener('click', async () => {
        const sessionId = btn.dataset.id;
        const reason = prompt('세션 종료 사유 (5자 이상):');
        if (!reason || reason.length < 5) return;
        if (sessionId === currentSessionId && !confirm('현재 로그인 중인 세션입니다. 종료하면 로그아웃됩니다. 계속할까요?')) {
          return;
        }
        try {
          await OmAdmin.mutate('sessionDelete', { sessionId, deleteReason: reason }, 'DELETE');
          if (sessionId === currentSessionId) {
            OmAdmin.clearSession();
            location.href = '/om/admin/login.html';
            return;
          }
          alert('세션을 종료했습니다.');
          await load(el);
        } catch (e) {
          alert(e.message);
        }
      }));

      OmAdmin.renderPagination(document.getElementById('pagination'), pageNo, pageSize, data.totalCount || 0, async p => {
        pageNo = p;
        await load(el);
      });
      } catch (e) {
        OmAdmin.showErrorBanner(el, e.message || String(e));
        throw e;
      }
    }

    OmAdmin.initPage('session', '세션 관리', async (el) => {
      el.innerHTML = `
        <div class="om-alert info">Spring Session JDBC(<code>SPRING_SESSION</code>)에 저장된 서버 세션을 조회·강제 종료합니다. 종료 시 감사/권한 이력이 기록됩니다.</div>
        <div class="om-stat-grid om-session-stats">
          <div class="om-stat-card"><div class="label">활성 세션</div><div class="value" id="statActive">-</div></div>
          <div class="om-stat-card"><div class="label">조회 건수</div><div class="value" id="statTotal">-</div></div>
        </div>
        <div class="om-card om-session-my-card">
          <div class="om-card-head">내 세션</div>
          <div class="om-card-body" id="mySessionPanel"><div class="om-empty">불러오는 중...</div></div>
        </div>
        <section class="om-filter-bar">
          <div class="field"><label for="filterUserId">사용자 ID</label><input id="filterUserId" type="text" placeholder="admin01"></div>
          <div class="field om-filter-check"><label><input id="filterActive" type="checkbox" checked> 활성 세션만</label></div>
          <button class="btn-primary" id="searchBtn" type="button">조회</button>
          <button class="btn-secondary" id="refreshBtn" type="button">새로고침</button>
        </section>
        <div class="om-card">
          <div class="om-card-head">세션 목록</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table om-session-table">
              <thead><tr>
                <th>세션 ID</th><th>사용자 ID</th><th>이름</th><th>지점</th><th>권한</th>
                <th>생성</th><th>최종 접근</th><th>유휴 타임아웃</th><th>만료</th><th>상태</th><th></th>
              </tr></thead>
              <tbody id="sessionBody"><tr><td colspan="11" class="om-empty">조회 중...</td></tr></tbody>
            </table>
            <div class="om-pagination" id="pagination" hidden></div>
          </div>
        </div>`;
      document.getElementById('searchBtn').addEventListener('click', () => {
        pageNo = 1;
        load(el).catch(e => OmAdmin.showError(el, e.message));
      });
      document.getElementById('refreshBtn').addEventListener('click', () => load(el).catch(e => OmAdmin.showError(el, e.message)));
      document.getElementById('filterActive').addEventListener('change', () => {
        pageNo = 1;
        load(el).catch(e => OmAdmin.showError(el, e.message));
      });
      await load(el);
    });
  </script>
</body>
</html>
