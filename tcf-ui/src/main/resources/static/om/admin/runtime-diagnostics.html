<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM 런타임 진단</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
</head>
<body>
  <script src="/_shared/om-admin.js?v=20260710a"></script>
  <script>
    function statusLabel(overallStatus) {
      if (overallStatus === 'CRITICAL') return '위험';
      if (overallStatus === 'WARN') return '주의';
      if (overallStatus === 'UNKNOWN') return '미확인';
      return '정상';
    }

    function renderRows(rows, columns, emptyText) {
      if (!rows.length) {
        return `<tr><td colspan="${columns}" class="om-empty">${emptyText}</td></tr>`;
      }
      return rows.join('');
    }

    function formatPct(value) {
      if (value == null || value === '') return '-';
      return `${value}%`;
    }

    async function load(el) {
      const { body, relay } = await OmAdmin.inquiry('runtimeDiagnostics', { includeDetails: 'Y' });
      const cards = body.cards || {};
      const statusClass = (body.overallStatus || 'NORMAL').toLowerCase();

      document.getElementById('rtmStatus').textContent =
        `${relay.elapsedMs}ms · 점검 ${body.checkedAt || '-'}`;
      document.getElementById('overallBanner').className = `om-status-banner ${statusClass}`;
      document.getElementById('overallMain').className = `om-status-main ${statusClass}`;
      document.getElementById('overallMain').textContent =
        `현재 상태: ${statusLabel(body.overallStatus)}`;
      document.getElementById('causeSummary').textContent =
        body.primaryMessage || '현재 주요 병목이 없습니다.';
      document.getElementById('causeMeta').textContent =
        `원인 코드 ${body.primaryCauseCode || '-'} · 영향 업무 ${body.dominantBusinessCode || '-'} · ServiceId ${body.dominantServiceId || '-'} · SQL ${body.dominantSqlId || '-'}`;

      document.getElementById('cardThread').textContent =
        `${formatPct(cards.threadBusyRatio)} busy`;
      document.getElementById('cardCpu').textContent = formatPct(cards.jvmCpuRatio);
      document.getElementById('cardHeap').textContent = formatPct(cards.heapRatio);
      document.getElementById('cardDb').textContent =
        `${cards.dbActive ?? 0} / ${cards.dbMaximum ?? 0}, Pending ${cards.dbPending ?? 0}`;
      document.getElementById('cardSlowTx').textContent = `${cards.slowTransactionCount ?? 0}건`;
      document.getElementById('cardSlowSql').textContent = `${cards.slowSqlCount ?? 0}건`;
      document.getElementById('cardBusiness').textContent =
        `${cards.dominantBusinessCode || '-'} ${formatPct(cards.dominantBusinessOwnershipPct)}`;

      const findingRows = (body.findings || []).map(f => `
        <tr>
          <td>${OmAdmin.field(f, 'businessCode')}</td>
          <td>${OmAdmin.chipForHealth(OmAdmin.field(f, 'status'))}</td>
          <td class="om-mono">${OmAdmin.field(f, 'causeCode')}</td>
          <td>${OmAdmin.field(f, 'message')}</td>
        </tr>`);

      const ownershipRows = (body.businessOwnership || []).map(r => `
        <tr>
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td>${OmAdmin.field(r, 'activeTransactions')}</td>
          <td>${OmAdmin.field(r, 'ownershipPct')}%</td>
        </tr>`);

      const activeRows = (body.activeTransactions || []).map(r => `
        <tr>
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td>${OmAdmin.field(r, 'elapsedMs')}ms</td>
          <td>${OmAdmin.field(r, 'currentStep')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'sqlId')}</td>
          <td>${OmAdmin.field(r, 'externalSystemCode')}</td>
        </tr>`);

      const threadRows = (body.threads || []).map(r => `
        <tr>
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'threadName')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td>${OmAdmin.field(r, 'elapsedMs')}ms</td>
          <td>${OmAdmin.field(r, 'currentStep')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'sqlId')}</td>
        </tr>`);

      const slowSqlRows = (body.slowSql || []).map(r => `
        <tr>
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'mapperId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'sqlId')}</td>
          <td>${OmAdmin.field(r, 'elapsedMs')}ms</td>
        </tr>`);

      document.getElementById('findingBody').innerHTML =
        renderRows(findingRows, 4, '원인 분석 결과 없음');
      document.getElementById('ownershipBody').innerHTML =
        renderRows(ownershipRows, 3, '업무 점유 데이터 없음');
      document.getElementById('activeBody').innerHTML =
        renderRows(activeRows, 6, '실행 중 거래 없음');
      document.getElementById('threadBody').innerHTML =
        renderRows(threadRows, 6, 'Thread 상세 없음');
      document.getElementById('slowSqlBody').innerHTML =
        renderRows(slowSqlRows, 5, 'Slow SQL 없음');
    }

    OmAdmin.initPage('runtime-diagnostics', '런타임 진단', async (el) => {
      el.innerHTML = `
        <div class="om-alert info">각 WAR의 <code>/internal/runtime/*</code> 진단 API를 조회해 Thread·JVM·DB Pool·ServiceId·SQL 상태를 통합 표시합니다.</div>
        <section class="om-filter-bar">
          <button class="btn-primary" id="refreshBtn" type="button">새로고침</button>
          <span id="rtmStatus" style="color:var(--muted);font-size:0.85rem;align-self:center">조회 중...</span>
        </section>
        <section class="om-status-banner normal" id="overallBanner">
          <div>
            <div class="om-status-main normal" id="overallMain">현재 상태: -</div>
            <div id="causeSummary" style="margin-top:8px">-</div>
            <div id="causeMeta" style="margin-top:4px;color:var(--muted);font-size:0.85rem">-</div>
          </div>
        </section>
        <div class="om-grid-3" style="margin-bottom:16px">
          <div class="om-card"><div class="om-card-head">Thread</div><div class="om-card-body" id="cardThread">-</div></div>
          <div class="om-card"><div class="om-card-head">JVM CPU</div><div class="om-card-body" id="cardCpu">-</div></div>
          <div class="om-card"><div class="om-card-head">Heap</div><div class="om-card-body" id="cardHeap">-</div></div>
          <div class="om-card"><div class="om-card-head">DB Pool</div><div class="om-card-body" id="cardDb">-</div></div>
          <div class="om-card"><div class="om-card-head">Slow 거래</div><div class="om-card-body" id="cardSlowTx">-</div></div>
          <div class="om-card"><div class="om-card-head">Slow SQL</div><div class="om-card-body" id="cardSlowSql">-</div></div>
        </div>
        <div class="om-card" style="margin-bottom:16px">
          <div class="om-card-head">주요 업무 점유</div>
          <div class="om-card-body" id="cardBusiness">-</div>
        </div>
        <div class="om-grid-2" style="margin-bottom:16px">
          <div class="om-card">
            <div class="om-card-head">원인 판정</div>
            <div class="om-card-body om-table-wrap">
              <table class="om-table">
                <thead><tr><th>업무</th><th>상태</th><th>원인코드</th><th>메시지</th></tr></thead>
                <tbody id="findingBody"><tr><td colspan="4" class="om-empty">조회 중...</td></tr></tbody>
              </table>
            </div>
          </div>
          <div class="om-card">
            <div class="om-card-head">업무 점유</div>
            <div class="om-card-body om-table-wrap">
              <table class="om-table">
                <thead><tr><th>업무</th><th>실행 거래</th><th>점유율</th></tr></thead>
                <tbody id="ownershipBody"><tr><td colspan="3" class="om-empty">조회 중...</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="om-card" style="margin-bottom:16px">
          <div class="om-card-head">실행 중 거래</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table">
              <thead><tr><th>업무</th><th>ServiceId</th><th>실행시간</th><th>단계</th><th>SQL</th><th>외부</th></tr></thead>
              <tbody id="activeBody"><tr><td colspan="6" class="om-empty">조회 중...</td></tr></tbody>
            </table>
          </div>
        </div>
        <div class="om-grid-2">
          <div class="om-card">
            <div class="om-card-head">Thread 상세</div>
            <div class="om-card-body om-table-wrap">
              <table class="om-table">
                <thead><tr><th>업무</th><th>Thread</th><th>ServiceId</th><th>실행시간</th><th>단계</th><th>SQL</th></tr></thead>
                <tbody id="threadBody"><tr><td colspan="6" class="om-empty">조회 중...</td></tr></tbody>
              </table>
            </div>
          </div>
          <div class="om-card">
            <div class="om-card-head">Slow SQL</div>
            <div class="om-card-body om-table-wrap">
              <table class="om-table">
                <thead><tr><th>업무</th><th>ServiceId</th><th>Mapper</th><th>SQL ID</th><th>실행시간</th></tr></thead>
                <tbody id="slowSqlBody"><tr><td colspan="5" class="om-empty">조회 중...</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>`;

      document.getElementById('refreshBtn').addEventListener('click', () => {
        load(el).catch(err => OmAdmin.showErrorBanner(el, err.message));
      });
      await load(el);
      window.setInterval(() => {
        load(el).catch(() => {});
      }, 30000);
    });
  </script>
</body>
</html>
