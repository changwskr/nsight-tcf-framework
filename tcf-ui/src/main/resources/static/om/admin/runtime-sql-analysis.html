<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM SQL 분석</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
  <style>
    .om-row-running td { background: rgba(59, 130, 246, 0.06); }
    .om-row-failed td { background: rgba(239, 68, 68, 0.08); }
    .om-row-warn td { background: rgba(251, 191, 36, 0.06); }
  </style>
</head>
<body>
  <script src="/_shared/om-admin.js?v=20260711d"></script>
  <script>
    function formatElapsed(ms) {
      const value = Number(ms);
      if (Number.isNaN(value)) return '-';
      if (value >= 1000) return `${(value / 1000).toFixed(1)}초`;
      return `${value}ms`;
    }

    function formatNum(value) {
      if (value == null || value === '') return '-';
      return Number(value).toLocaleString('ko-KR');
    }

    function formatStatus(status) {
      if (status === 'RUNNING') return '<span class="om-chip info">실행 중</span>';
      if (status === 'COMPLETED') return '<span class="om-chip">완료</span>';
      if (status === 'FAILED') return '<span class="om-chip critical">실패</span>';
      return status || '-';
    }

    function rowClass(status) {
      if (status === 'RUNNING') return 'om-row-running';
      if (status === 'FAILED') return 'om-row-failed';
      return '';
    }

    function renderRows(rows, columns, emptyText) {
      if (!rows.length) {
        return `<tr><td colspan="${columns}" class="om-empty">${emptyText}</td></tr>`;
      }
      return rows.join('');
    }

    async function load(el) {
      const { body, relay } = await OmAdmin.inquiry('runtimeDiagnostics', { includeDetails: 'Y' });
      const sqlAnalysis = body.sqlAnalysis || {};
      const alert = sqlAnalysis.slowSqlAlert || {};

      document.getElementById('rtmStatus').textContent =
        `${relay.elapsedMs}ms · 점검 ${body.checkedAt || '-'}`;

      const slowDetected = Boolean(alert.detected);
      const bannerClass = slowDetected ? 'warn' : 'normal';
      document.getElementById('sqlBanner').className = `om-status-banner ${bannerClass}`;
      document.getElementById('sqlMain').className = `om-status-main ${bannerClass}`;
      document.getElementById('sqlMain').textContent =
        slowDetected ? 'Slow SQL 징후: SLOW_SQL' : 'SQL 상태: 정상 범위';
      document.getElementById('sqlMessage').textContent = alert.message || '-';
      document.getElementById('sqlCriteria').textContent =
        `${alert.criteria || '-'} · 실행 중 ${formatNum(sqlAnalysis.runningSqlCount)}건`;
      document.getElementById('thresholdNote').textContent = sqlAnalysis.thresholdNote || '-';

      const thresholdRows = (sqlAnalysis.thresholds || []).map(t => `
        <tr>
          <td>${OmAdmin.field(t, 'type')}</td>
          <td>${t.designThresholdMs != null ? `${t.designThresholdMs}ms` : 'ServiceId별'}</td>
          <td>${t.appliedThresholdMs != null ? `${t.appliedThresholdMs}ms` : '-'}</td>
          <td>${OmAdmin.field(t, 'applied')}</td>
        </tr>`);
      document.getElementById('thresholdBody').innerHTML =
        renderRows(thresholdRows, 4, '기준 정보 없음');

      const statusRows = (sqlAnalysis.statusRows || []).map(r => `
        <tr class="${rowClass(r.status)}">
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'mapperSql')}</td>
          <td>${formatStatus(r.status)}</td>
          <td>${formatElapsed(r.elapsedMs)}</td>
          <td>${formatNum(r.affectedRows)}</td>
        </tr>`);
      document.getElementById('statusBody').innerHTML =
        renderRows(statusRows, 6, '실행 중·Slow SQL 없음');

      const slowRows = (sqlAnalysis.completedSlowSql || []).map(r => `
        <tr class="${Boolean(r.success) === false ? 'om-row-failed' : 'om-row-warn'}">
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'mapperSql') || OmAdmin.field(r, 'sqlId')}</td>
          <td>${formatStatus(r.status || (r.success === false ? 'FAILED' : 'COMPLETED'))}</td>
          <td>${formatElapsed(r.elapsedMs)}</td>
          <td>${formatNum(r.affectedRows)}</td>
        </tr>`);
      document.getElementById('slowSqlBody').innerHTML =
        renderRows(slowRows, 6, 'Slow SQL 이력 없음');
    }

    OmAdmin.initPage('runtime-sql-analysis', 'SQL 분석', async (el) => {
      el.innerHTML = `
        <div class="om-alert info">
          설계 10장 SQL 분석 — MyBatis Interceptor 수집 · SQL 원문·Parameter는 표시하지 않습니다.
          <a href="/om/admin/runtime-diagnostics.html" style="margin-left:8px">← 런타임 진단 통합</a>
          <a href="/om/admin/runtime-dbpool-analysis.html" style="margin-left:8px">DB Pool 분석</a>
          <a href="/om/admin/runtime-dominance-analysis.html" style="margin-left:8px">자원 독점 분석</a>
          <a href="/om/admin/runtime-transaction-detail.html" style="margin-left:8px">거래·Thread 상세</a>
        </div>
        <section class="om-filter-bar">
          <button class="btn-primary" id="refreshBtn" type="button">새로고침</button>
          <span id="rtmStatus" style="color:var(--muted);font-size:0.85rem;align-self:center">조회 중...</span>
        </section>

        <section class="om-status-banner normal" id="sqlBanner" style="margin-bottom:16px">
          <div>
            <div class="om-status-main normal" id="sqlMain">SQL 상태: -</div>
            <div id="sqlMessage" style="margin-top:8px">-</div>
            <div id="sqlCriteria" style="margin-top:4px;color:var(--muted);font-size:0.85rem">-</div>
          </div>
        </section>

        <div class="om-card" style="margin-bottom:16px">
          <div class="om-card-head">10.2 Slow SQL 기준</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table">
              <thead>
                <tr><th>처리 유형</th><th>설계 기준</th><th>현재 적용</th><th>비고</th></tr>
              </thead>
              <tbody id="thresholdBody"><tr><td colspan="4" class="om-empty">조회 중...</td></tr></tbody>
            </table>
            <div id="thresholdNote" style="color:var(--muted);font-size:0.85rem;margin-top:8px">-</div>
          </div>
        </div>

        <div class="om-card" style="margin-bottom:16px">
          <div class="om-card-head">10.3 SQL 상태 (실행 중 + Slow SQL)</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table">
              <thead>
                <tr>
                  <th>업무</th><th>ServiceId</th><th>Mapper SQL</th>
                  <th>상태</th><th>실행시간</th><th>건수</th>
                </tr>
              </thead>
              <tbody id="statusBody"><tr><td colspan="6" class="om-empty">조회 중...</td></tr></tbody>
            </table>
          </div>
        </div>

        <div class="om-card">
          <div class="om-card-head">Slow SQL 이력 (최근 threshold 초과)</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table">
              <thead>
                <tr>
                  <th>업무</th><th>ServiceId</th><th>Mapper SQL</th>
                  <th>상태</th><th>실행시간</th><th>영향 행 수</th>
                </tr>
              </thead>
              <tbody id="slowSqlBody"><tr><td colspan="6" class="om-empty">조회 중...</td></tr></tbody>
            </table>
          </div>
        </div>`;

      document.getElementById('refreshBtn').addEventListener('click', () => {
        load(el).catch(err => OmAdmin.showErrorBanner(el, err.message));
      });
      await load(el);
      window.setInterval(() => {
        load(el).catch(() => {});
      }, 30000);
    });
  </script>
</body>
</html>
