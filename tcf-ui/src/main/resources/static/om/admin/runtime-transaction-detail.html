<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM 거래·Thread 상세</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
  <style>
    .om-api-label {
      font-family: var(--mono, monospace);
      font-size: 0.82rem;
      color: var(--muted);
    }
    .om-row-warn td { background: rgba(251, 191, 36, 0.06); }
  </style>
</head>
<body>
  <script src="/_shared/om-admin.js?v=20260711f"></script>
  <script>
    function formatElapsed(ms) {
      const value = Number(ms);
      if (Number.isNaN(value)) return '-';
      if (value >= 1000) return `${(value / 1000).toFixed(1)}초`;
      return `${value}ms`;
    }

    function formatNum(value) {
      if (value == null || value === '') return '-';
      return Number(value).toLocaleString('ko-KR');
    }

    function formatBool(value) {
      if (value === true) return '성공';
      if (value === false) return '실패';
      return '-';
    }

    function renderRows(rows, columns, emptyText) {
      if (!rows.length) {
        return `<tr><td colspan="${columns}" class="om-empty">${emptyText}</td></tr>`;
      }
      return rows.join('');
    }

    function stepChip(step) {
      if (!step || step === '-') return '-';
      const warn = ['WAIT_DB_CONNECTION', 'EXECUTING_SQL', 'WAIT_EXTERNAL'];
      if (warn.includes(step)) return `<span class="om-chip warn">${step}</span>`;
      return `<span class="om-chip">${step}</span>`;
    }

    function mapperCell(row) {
      const mapperSql = OmAdmin.field(row, 'mapperSql');
      if (mapperSql && mapperSql !== '-') return mapperSql;
      return OmAdmin.field(row, 'sqlId');
    }

    function sectionHeader(section, block) {
      return `${section.title || '-'} · ${block.count ?? 0}건 · <span class="om-api-label">${block.api || '-'}</span>`;
    }

    async function load(el) {
      const { body, relay } = await OmAdmin.inquiry('runtimeDiagnostics', { includeDetails: 'Y' });
      const detail = body.transactionDetailAnalysis || {};

      document.getElementById('rtmStatus').textContent =
        `${relay.elapsedMs}ms · 점검 ${body.checkedAt || '-'}`;
      document.getElementById('scopeNote').textContent = detail.scopeNote || '-';

      const slowTx = detail.slowTransactions || {};
      const activeTx = detail.activeTransactions || {};
      const slowSql = detail.slowSql || {};
      const threads = detail.threads || {};

      document.getElementById('slowTxHead').textContent = sectionHeader({ title: '12.2 최근 Slow 거래' }, slowTx);
      document.getElementById('activeTxHead').textContent = sectionHeader({ title: '12.3 현재 실행 중 거래' }, activeTx);
      document.getElementById('slowSqlHead').textContent = sectionHeader({ title: '12.4 최근 Slow SQL' }, slowSql);
      document.getElementById('threadHead').textContent = sectionHeader({ title: '12.5 Thread 상세' }, threads);

      document.getElementById('statSlowTx').textContent = formatNum(slowTx.count);
      document.getElementById('statActiveTx').textContent = formatNum(activeTx.count);
      document.getElementById('statSlowSql').textContent = formatNum(slowSql.count);
      document.getElementById('statThreads').textContent = formatNum(threads.count);

      const slowTxRows = (slowTx.rows || []).map(r => `
        <tr class="om-row-warn">
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'guid')}</td>
          <td>${formatElapsed(r.elapsedMs)}</td>
          <td>${stepChip(OmAdmin.field(r, 'lastStep'))}</td>
          <td class="om-mono">${mapperCell(r)}</td>
        </tr>`);
      document.getElementById('slowTxBody').innerHTML =
        renderRows(slowTxRows, 6, '최근 Slow 거래 없음');

      const activeRows = (activeTx.rows || []).map(r => `
        <tr>
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'guid')}</td>
          <td>${formatElapsed(r.elapsedMs)}</td>
          <td>${stepChip(OmAdmin.field(r, 'currentStep'))}</td>
          <td class="om-mono">${mapperCell(r)}</td>
          <td>${formatElapsed(r.dbWaitMs)}</td>
          <td>${OmAdmin.field(r, 'externalSystemCode')}</td>
        </tr>`);
      document.getElementById('activeBody').innerHTML =
        renderRows(activeRows, 8, '실행 중 거래 없음');

      const slowSqlRows = (slowSql.rows || []).map(r => `
        <tr class="om-row-warn">
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'mapperSql') || OmAdmin.field(r, 'sqlId')}</td>
          <td>${formatElapsed(r.elapsedMs)}</td>
          <td>${formatBool(r.success)}</td>
          <td>${formatNum(r.affectedRows)}</td>
        </tr>`);
      document.getElementById('slowSqlBody').innerHTML =
        renderRows(slowSqlRows, 6, 'Slow SQL 없음');

      const threadRows = (threads.rows || []).map(r => `
        <tr>
          <td>${OmAdmin.field(r, 'businessCode')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'threadName')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'serviceId')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'guid')}</td>
          <td>${formatElapsed(r.elapsedMs)}</td>
          <td>${stepChip(OmAdmin.field(r, 'currentStep'))}</td>
          <td class="om-mono">${mapperCell(r)}</td>
          <td>${formatElapsed(r.dbWaitMs)}</td>
          <td>${OmAdmin.field(r, 'externalSystemCode')}</td>
        </tr>`);
      document.getElementById('threadBody').innerHTML =
        renderRows(threadRows, 9, 'TCF 연계 Thread 없음');
    }

    OmAdmin.initPage('runtime-transaction-detail', '거래·Thread 상세', async (el) => {
      el.innerHTML = `
        <div class="om-alert info">
          설계 12장 — WAR <code>/internal/runtime/*</code> 상세 API 통합 조회.
          <a href="/om/admin/runtime-diagnostics.html" style="margin-left:8px">← 런타임 진단 통합</a>
        </div>
        <section class="om-filter-bar">
          <button class="btn-primary" id="refreshBtn" type="button">새로고침</button>
          <span id="rtmStatus" style="color:var(--muted);font-size:0.85rem;align-self:center">조회 중...</span>
        </section>

        <div class="om-stat-grid" style="margin-bottom:16px">
          <div class="om-stat-card"><div class="label">12.2 Slow 거래</div><div class="value" id="statSlowTx">-</div></div>
          <div class="om-stat-card"><div class="label">12.3 실행 중</div><div class="value" id="statActiveTx">-</div></div>
          <div class="om-stat-card"><div class="label">12.4 Slow SQL</div><div class="value" id="statSlowSql">-</div></div>
          <div class="om-stat-card"><div class="label">12.5 Thread</div><div class="value" id="statThreads">-</div></div>
        </div>
        <div id="scopeNote" style="color:var(--muted);font-size:0.85rem;margin-bottom:16px">-</div>

        <div class="om-card" style="margin-bottom:16px">
          <div class="om-card-head" id="activeTxHead">12.3 현재 실행 중 거래</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table">
              <thead>
                <tr>
                  <th>업무</th><th>ServiceId</th><th>GUID</th><th>경과</th>
                  <th>단계</th><th>Mapper SQL</th><th>DB 대기</th><th>외부</th>
                </tr>
              </thead>
              <tbody id="activeBody"><tr><td colspan="8" class="om-empty">조회 중...</td></tr></tbody>
            </table>
          </div>
        </div>

        <div class="om-grid-2" style="margin-bottom:16px">
          <div class="om-card">
            <div class="om-card-head" id="slowTxHead">12.2 최근 Slow 거래</div>
            <div class="om-card-body om-table-wrap">
              <table class="om-table">
                <thead>
                  <tr>
                    <th>업무</th><th>ServiceId</th><th>GUID</th>
                    <th>경과</th><th>마지막 단계</th><th>SQL</th>
                  </tr>
                </thead>
                <tbody id="slowTxBody"><tr><td colspan="6" class="om-empty">조회 중...</td></tr></tbody>
              </table>
            </div>
          </div>
          <div class="om-card">
            <div class="om-card-head" id="slowSqlHead">12.4 최근 Slow SQL</div>
            <div class="om-card-body om-table-wrap">
              <table class="om-table">
                <thead>
                  <tr>
                    <th>업무</th><th>ServiceId</th><th>Mapper SQL</th>
                    <th>실행시간</th><th>결과</th><th>건수</th>
                  </tr>
                </thead>
                <tbody id="slowSqlBody"><tr><td colspan="6" class="om-empty">조회 중...</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="om-card">
          <div class="om-card-head" id="threadHead">12.5 Thread 상세 (TCF 연계)</div>
          <div class="om-card-body om-table-wrap">
            <table class="om-table">
              <thead>
                <tr>
                  <th>업무</th><th>Thread</th><th>ServiceId</th><th>GUID</th>
                  <th>경과</th><th>단계</th><th>Mapper SQL</th><th>DB 대기</th><th>외부</th>
                </tr>
              </thead>
              <tbody id="threadBody"><tr><td colspan="9" class="om-empty">조회 중...</td></tr></tbody>
            </table>
          </div>
        </div>`;

      document.getElementById('refreshBtn').addEventListener('click', () => {
        load(el).catch(err => OmAdmin.showErrorBanner(el, err.message));
      });
      await load(el);
      window.setInterval(() => {
        load(el).catch(() => {});
      }, 30000);
    });
  </script>
</body>
</html>
