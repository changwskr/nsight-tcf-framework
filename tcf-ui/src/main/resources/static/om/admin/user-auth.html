<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM 사용자 / 권한 / 메뉴</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
</head>
<body>
  <script src="/_shared/om-admin.js?v=20260627b"></script>
  <script>
    let userPage = 1;
    const USER_PAGE_SIZE = 10;
    let userEditMode = false;
    let authGroupEditMode = false;
    let menuEditMode = false;
    let functionAuthEditMode = false;
    let authGroupOptions = [];
    let menuOptions = [];

    async function loadAuthGroupOptions() {
      const { body } = await OmAdmin.inquiry('authGroup', {});
      authGroupOptions = body.rows || body.authGroups || [];
      ['filterAuthGroup', 'fAuthGroup', 'filterFaGroup', 'fFaAuthGroup', 'filterDaGroup'].forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        const current = sel.value;
        const isFilter = ['filterAuthGroup', 'filterFaGroup', 'filterDaGroup'].includes(id);
        sel.innerHTML = isFilter ? '<option value="">전체</option>' : '';
        authGroupOptions.forEach(g => {
          const gid = OmAdmin.field(g, 'authGroupId');
          const name = OmAdmin.field(g, 'authGroupName');
          sel.innerHTML += `<option value="${gid}">${name} (${gid})</option>`;
        });
        if (current) sel.value = current;
      });
    }

    async function loadMenuOptions() {
      const { body } = await OmAdmin.inquiry('menu', {});
      const rows = body.rows || body.menus || [];
      menuOptions = rows.filter(m => OmAdmin.field(m, 'useYn', 'Y') !== 'N');
      const sel = document.getElementById('fMenuParent');
      if (!sel) return;
      const current = sel.value;
      const editingId = document.getElementById('fMenuId')?.value.trim();
      sel.innerHTML = '<option value="">(없음 — 최상위)</option>';
      menuOptions
        .filter(m => OmAdmin.field(m, 'menuId') !== editingId)
        .forEach(m => {
          const mid = OmAdmin.field(m, 'menuId');
          const name = OmAdmin.field(m, 'menuName');
          const folder = !OmAdmin.field(m, 'menuUrl', '');
          const tag = folder ? ' [그룹]' : '';
          sel.innerHTML += `<option value="${mid}">${name}${tag} (${mid})</option>`;
        });
      if (current) sel.value = current;
    }

    function menuParentLabel(row) {
      const id = OmAdmin.field(row, 'parentMenuId', '');
      if (!id || id === '-' || id === 'null') return '(없음)';
      const name = OmAdmin.field(row, 'parentMenuName', '');
      return name ? `${name} (${id})` : id;
    }

    function formatMenuUrl(url) {
      if (url == null || url === '' || url === 'null') return '—';
      return url;
    }

    function formatMenuUrlFromRow(row) {
      const url = OmAdmin.field(row, 'menuUrl', '');
      if (!url) {
        const id = OmAdmin.field(row, 'menuId', '');
        if (id.startsWith('OM_GRP_')) return '(그룹)';
      }
      return formatMenuUrl(url);
    }

    function ynChip(v) {
      return v === 'Y' ? '<span class="om-chip ok">Y</span>' : '<span class="om-chip muted">N</span>';
    }

    async function loadFunctionAuthMenuOptions() {
      if (!menuOptions.length) {
        const { body } = await OmAdmin.inquiry('menu', {});
        menuOptions = (body.rows || body.menus || []).filter(m => OmAdmin.field(m, 'useYn', 'Y') !== 'N');
      }
      const sel = document.getElementById('fFaMenu');
      if (!sel) return;
      const current = sel.value;
      sel.innerHTML = '';
      menuOptions
        .filter(m => {
          const url = OmAdmin.field(m, 'menuUrl', '');
          return url && url !== 'null';
        })
        .forEach(m => {
          const mid = OmAdmin.field(m, 'menuId');
          const name = OmAdmin.field(m, 'menuName');
          sel.innerHTML += `<option value="${mid}">${name} (${mid})</option>`;
        });
      if (current) sel.value = current;
    }

    function clearFunctionAuthForm() {
      functionAuthEditMode = false;
      document.getElementById('fFaAuthId').value = '';
      document.getElementById('fFaAuthId').readOnly = true;
      if (authGroupOptions.length) {
        document.getElementById('fFaAuthGroup').value = OmAdmin.field(authGroupOptions[0], 'authGroupId');
      }
      document.getElementById('fFaMenu').value = document.getElementById('fFaMenu').options[0]?.value || '';
      ['fFaInquiry', 'fFaRegister', 'fFaUpdate', 'fFaDelete', 'fFaDownload'].forEach(id => {
        document.getElementById(id).value = 'N';
      });
      document.getElementById('fFaReason').value = '';
      document.getElementById('functionAuthFormMode').textContent = '신규 등록';
    }

    function fillFunctionAuthForm(row) {
      functionAuthEditMode = true;
      document.getElementById('fFaAuthId').value = OmAdmin.field(row, 'authId', '');
      document.getElementById('fFaAuthGroup').value = OmAdmin.field(row, 'authGroupId', '');
      document.getElementById('fFaMenu').value = OmAdmin.field(row, 'menuId', '');
      document.getElementById('fFaInquiry').value = OmAdmin.field(row, 'canInquiry', 'N');
      document.getElementById('fFaRegister').value = OmAdmin.field(row, 'canRegister', 'N');
      document.getElementById('fFaUpdate').value = OmAdmin.field(row, 'canUpdate', 'N');
      document.getElementById('fFaDelete').value = OmAdmin.field(row, 'canDelete', 'N');
      document.getElementById('fFaDownload').value = OmAdmin.field(row, 'canDownload', 'N');
      document.getElementById('fFaAuthId').readOnly = true;
      document.getElementById('functionAuthFormMode').textContent = '수정 / 삭제';
    }

    function functionAuthFormPayload() {
      return {
        authId: document.getElementById('fFaAuthId').value.trim(),
        authGroupId: document.getElementById('fFaAuthGroup').value,
        menuId: document.getElementById('fFaMenu').value,
        canInquiry: document.getElementById('fFaInquiry').value,
        canRegister: document.getElementById('fFaRegister').value,
        canUpdate: document.getElementById('fFaUpdate').value,
        canDelete: document.getElementById('fFaDelete').value,
        canDownload: document.getElementById('fFaDownload').value,
        changeReason: document.getElementById('fFaReason').value.trim()
      };
    }

    async function loadFunctionAuths(el) {
      const tbody = document.getElementById('tabBody');
      tbody.innerHTML = '<tr><td colspan="8" class="om-empty">조회 중...</td></tr>';
      document.getElementById('userPagination').hidden = true;

      const criteria = {};
      const group = document.getElementById('filterFaGroup')?.value;
      const menu = document.getElementById('filterFaMenu')?.value.trim();
      if (group) criteria.authGroupId = group;
      if (menu) criteria.menuId = menu;

      const { body } = await OmAdmin.inquiry('functionAuth', criteria);
      const rows = body.rows || [];
      if (!rows.length) {
        const hint = group
          ? `선택한 권한그룹(${group})에 기능권한이 없습니다. 필터를 '전체'로 바꾸거나 아래에서 신규 등록하세요.`
          : '등록된 기능권한이 없습니다. om 재기동 후에도 비어 있으면 seed-function-auth.bat 실행을 확인하세요.';
        tbody.innerHTML = `<tr><td colspan="8" class="om-empty">${hint}</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(r => `
        <tr class="om-row-selectable" data-auth-id="${OmAdmin.field(r, 'authId')}">
          <td>${OmAdmin.field(r, 'authGroupName', OmAdmin.field(r, 'authGroupId'))}</td>
          <td class="om-mono">${OmAdmin.field(r, 'menuId')}</td>
          <td>${OmAdmin.field(r, 'menuName')}</td>
          <td>${ynChip(OmAdmin.field(r, 'canInquiry'))}</td>
          <td>${ynChip(OmAdmin.field(r, 'canRegister'))}</td>
          <td>${ynChip(OmAdmin.field(r, 'canUpdate'))}</td>
          <td>${ynChip(OmAdmin.field(r, 'canDelete'))}</td>
          <td>${ynChip(OmAdmin.field(r, 'canDownload'))}</td>
        </tr>`).join('');
      tbody.querySelectorAll('tr.om-row-selectable').forEach(tr => {
        tr.addEventListener('click', async () => {
          tbody.querySelectorAll('tr.om-row-selected').forEach(r => r.classList.remove('om-row-selected'));
          tr.classList.add('om-row-selected');
          try {
            const { body: detail } = await OmAdmin.inquiry('functionAuthDetail', { authId: tr.dataset.authId });
            fillFunctionAuthForm(detail.row || {});
          } catch (e) {
            OmAdmin.showErrorBanner(el, e.message);
          }
        });
      });
    }

    async function loadDataAuths(el) {
      const tbody = document.getElementById('tabBody');
      tbody.innerHTML = '<tr><td colspan="4" class="om-empty">조회 중...</td></tr>';
      document.getElementById('userPagination').hidden = true;

      const group = document.getElementById('filterDaGroup')?.value;
      const criteria = group ? { authGroupId: group } : {};
      const { body } = await OmAdmin.inquiry('dataAuth', criteria);
      const rows = body.rows || [];
      if (!rows.length) {
        const hint = group
          ? `선택한 권한그룹(${group})에 데이터권한이 없습니다.`
          : '등록된 데이터권한이 없습니다.';
        tbody.innerHTML = `<tr><td colspan="4" class="om-empty">${hint}</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${OmAdmin.field(r, 'authGroupName', OmAdmin.field(r, 'authGroupId'))}</td>
          <td class="om-mono">${OmAdmin.field(r, 'branchScope')}</td>
          <td class="om-mono">${OmAdmin.field(r, 'customerAccessLevel')}</td>
          <td>${OmAdmin.field(r, 'description')}</td>
        </tr>`).join('');
    }

    function readUserFilters() {
      const v = id => document.getElementById(id).value.trim();
      const f = { pageNo: userPage, pageSize: USER_PAGE_SIZE };
      if (v('filterUserId')) f.userId = v('filterUserId');
      if (v('filterUserName')) f.userName = v('filterUserName');
      if (v('filterBranchId')) f.branchId = v('filterBranchId');
      if (v('filterAuthGroup')) f.authGroupId = v('filterAuthGroup');
      if (v('filterUseYn')) f.useYn = v('filterUseYn');
      return f;
    }

    function clearUserForm() {
      userEditMode = false;
      document.getElementById('fUserId').readOnly = false;
      ['fUserId', 'fUserName', 'fBranchId', 'fPassword', 'fReason'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('fUseYn').value = 'Y';
      if (authGroupOptions.length) {
        document.getElementById('fAuthGroup').value = OmAdmin.field(authGroupOptions[0], 'authGroupId');
      }
      document.getElementById('userFormMode').textContent = '신규 등록';
      document.getElementById('fPasswordHint').textContent = '등록 시 필수';
    }

    function fillUserForm(row) {
      userEditMode = true;
      document.getElementById('fUserId').value = OmAdmin.field(row, 'userId', '');
      document.getElementById('fUserName').value = OmAdmin.field(row, 'userName', '');
      document.getElementById('fBranchId').value = OmAdmin.field(row, 'branchId', '');
      document.getElementById('fAuthGroup').value = OmAdmin.field(row, 'authGroupId', '');
      document.getElementById('fUseYn').value = OmAdmin.field(row, 'useYn', 'Y');
      document.getElementById('fPassword').value = '';
      document.getElementById('fUserId').readOnly = true;
      document.getElementById('userFormMode').textContent = '수정 / 삭제';
      document.getElementById('fPasswordHint').textContent = '변경 시에만 입력';
    }

    function userFormPayload() {
      return {
        userId: document.getElementById('fUserId').value.trim(),
        userName: document.getElementById('fUserName').value.trim(),
        branchId: document.getElementById('fBranchId').value.trim(),
        authGroupId: document.getElementById('fAuthGroup').value,
        useYn: document.getElementById('fUseYn').value,
        password: document.getElementById('fPassword').value,
        changeReason: document.getElementById('fReason').value.trim()
      };
    }

    function clearAuthGroupForm() {
      authGroupEditMode = false;
      document.getElementById('fAuthGroupId').readOnly = false;
      ['fAuthGroupId', 'fAuthGroupName', 'fAuthGroupDesc', 'fAuthGroupReason'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('fAuthGroupUseYn').value = 'Y';
      document.getElementById('authGroupFormMode').textContent = '신규 등록';
    }

    function fillAuthGroupForm(row) {
      authGroupEditMode = true;
      document.getElementById('fAuthGroupId').value = OmAdmin.field(row, 'authGroupId', '');
      document.getElementById('fAuthGroupName').value = OmAdmin.field(row, 'authGroupName', '');
      document.getElementById('fAuthGroupDesc').value = OmAdmin.field(row, 'description', '');
      document.getElementById('fAuthGroupUseYn').value = OmAdmin.field(row, 'useYn', 'Y');
      document.getElementById('fAuthGroupId').readOnly = true;
      document.getElementById('authGroupFormMode').textContent = '수정 / 삭제';
    }

    function authGroupFormPayload() {
      return {
        authGroupId: document.getElementById('fAuthGroupId').value.trim(),
        authGroupName: document.getElementById('fAuthGroupName').value.trim(),
        description: document.getElementById('fAuthGroupDesc').value.trim(),
        useYn: document.getElementById('fAuthGroupUseYn').value,
        changeReason: document.getElementById('fAuthGroupReason').value.trim()
      };
    }

    function clearMenuForm() {
      menuEditMode = false;
      document.getElementById('fMenuId').readOnly = false;
      ['fMenuId', 'fMenuName', 'fMenuUrl', 'fMenuSort', 'fMenuReason'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('fMenuParent').value = '';
      document.getElementById('fMenuUseYn').value = 'Y';
      document.getElementById('fMenuSort').value = '0';
      document.getElementById('menuFormMode').textContent = '신규 등록';
    }

    function fillMenuForm(row) {
      menuEditMode = true;
      document.getElementById('fMenuId').value = OmAdmin.field(row, 'menuId', '');
      document.getElementById('fMenuName').value = OmAdmin.field(row, 'menuName', '');
      document.getElementById('fMenuUrl').value = OmAdmin.field(row, 'menuUrl', '');
      document.getElementById('fMenuParent').value = OmAdmin.field(row, 'parentMenuId', '');
      document.getElementById('fMenuSort').value = OmAdmin.field(row, 'sortOrder', '0');
      document.getElementById('fMenuUseYn').value = OmAdmin.field(row, 'useYn', 'Y');
      document.getElementById('fMenuId').readOnly = true;
      document.getElementById('menuFormMode').textContent = '수정 / 삭제';
    }

    function menuFormPayload() {
      const parent = document.getElementById('fMenuParent').value.trim();
      return {
        menuId: document.getElementById('fMenuId').value.trim(),
        menuName: document.getElementById('fMenuName').value.trim(),
        menuUrl: document.getElementById('fMenuUrl').value.trim(),
        parentMenuId: parent || null,
        sortOrder: Number(document.getElementById('fMenuSort').value || 0),
        useYn: document.getElementById('fMenuUseYn').value,
        changeReason: document.getElementById('fMenuReason').value.trim()
      };
    }

    async function loadUsers(el) {
      const tbody = document.getElementById('tabBody');
      const statusEl = document.getElementById('userListStatus');
      tbody.innerHTML = '<tr><td colspan="6" class="om-empty">조회 중...</td></tr>';
      statusEl.textContent = '조회 중...';

      const { body } = await OmAdmin.inquiry('user', readUserFilters());
      const rows = body.rows || [];
      statusEl.textContent = `페이지 ${body.pageNo || userPage} · 총 ${body.totalCount ?? 0}건`;

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="om-empty">사용자 없음</td></tr>';
      } else {
        tbody.innerHTML = rows.map(r => `
          <tr class="om-row-selectable" data-user-id="${OmAdmin.field(r, 'userId')}">
            <td class="om-mono">${OmAdmin.field(r, 'userId')}</td>
            <td>${OmAdmin.field(r, 'userName')}</td>
            <td>${OmAdmin.field(r, 'branchId')}</td>
            <td>${OmAdmin.field(r, 'authGroupName', OmAdmin.field(r, 'authGroupId'))}</td>
            <td>${OmAdmin.field(r, 'useYn') === 'Y' ? '<span class="om-chip ok">Y</span>' : '<span class="om-chip muted">N</span>'}</td>
            <td class="om-mono">${OmAdmin.field(r, 'lastLoginTime')}</td>
          </tr>`).join('');
        tbody.querySelectorAll('tr.om-row-selectable').forEach(tr => {
          tr.addEventListener('click', async () => {
            tbody.querySelectorAll('tr.om-row-selected').forEach(r => r.classList.remove('om-row-selected'));
            tr.classList.add('om-row-selected');
            try {
              const { body: detail } = await OmAdmin.inquiry('userDetail', { userId: tr.dataset.userId });
              fillUserForm(detail.row || {});
            } catch (e) {
              OmAdmin.showErrorBanner(el, e.message);
            }
          });
        });
      }

      OmAdmin.renderPagination(
        document.getElementById('userPagination'),
        body.pageNo || userPage,
        body.pageSize || USER_PAGE_SIZE,
        body.totalCount || 0,
        p => {
          userPage = p;
          loadUsers(el).catch(e => OmAdmin.showErrorBanner(el, e.message));
        },
        true
      );
    }

    async function loadAuthGroups(el) {
      const tbody = document.getElementById('tabBody');
      tbody.innerHTML = '<tr><td colspan="4" class="om-empty">조회 중...</td></tr>';
      document.getElementById('userPagination').hidden = true;

      const v = id => document.getElementById(id)?.value.trim() || '';
      const criteria = {};
      if (v('filterAuthGroupId')) criteria.authGroupId = v('filterAuthGroupId');
      if (v('filterAuthGroupName')) criteria.authGroupName = v('filterAuthGroupName');
      if (v('filterAuthGroupUseYn')) criteria.useYn = v('filterAuthGroupUseYn');

      const { body } = await OmAdmin.inquiry('authGroup', criteria);
      const rows = body.rows || body.authGroups || [];
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="om-empty">권한그룹 없음</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(r => `
        <tr class="om-row-selectable" data-auth-group-id="${OmAdmin.field(r, 'authGroupId')}">
          <td class="om-mono">${OmAdmin.field(r, 'authGroupId')}</td>
          <td>${OmAdmin.field(r, 'authGroupName')}</td>
          <td>${OmAdmin.field(r, 'description')}</td>
          <td>${OmAdmin.field(r, 'useYn') === 'Y' ? '<span class="om-chip ok">Y</span>' : '<span class="om-chip muted">N</span>'}</td>
        </tr>`).join('');
      tbody.querySelectorAll('tr.om-row-selectable').forEach(tr => {
        tr.addEventListener('click', async () => {
          tbody.querySelectorAll('tr.om-row-selected').forEach(r => r.classList.remove('om-row-selected'));
          tr.classList.add('om-row-selected');
          try {
            const { body: detail } = await OmAdmin.inquiry('authGroupDetail', {
              authGroupId: tr.dataset.authGroupId
            });
            fillAuthGroupForm(detail.row || {});
          } catch (e) {
            OmAdmin.showErrorBanner(el, e.message);
          }
        });
      });
    }

    async function loadMenus(el) {
      const tbody = document.getElementById('tabBody');
      tbody.innerHTML = '<tr><td colspan="5" class="om-empty">조회 중...</td></tr>';
      document.getElementById('userPagination').hidden = true;

      const v = id => document.getElementById(id)?.value.trim() || '';
      const criteria = {};
      if (v('filterMenuId')) criteria.menuId = v('filterMenuId');
      if (v('filterMenuName')) criteria.menuName = v('filterMenuName');
      if (v('filterMenuUseYn')) criteria.useYn = v('filterMenuUseYn');

      const { body } = await OmAdmin.inquiry('menu', criteria);
      const rows = body.rows || body.menus || [];
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="om-empty">메뉴 없음</td></tr>';
        return;
      }
      if (!menuOptions.length) {
        menuOptions = rows.filter(m => OmAdmin.field(m, 'useYn', 'Y') !== 'N');
      }
      tbody.innerHTML = rows.map(r => `
        <tr class="om-row-selectable" data-menu-id="${OmAdmin.field(r, 'menuId')}">
          <td>${OmAdmin.field(r, 'menuId')}</td>
          <td>${OmAdmin.field(r, 'menuName')}</td>
          <td class="om-mono">${formatMenuUrlFromRow(r)}</td>
          <td>${menuParentLabel(r)}</td>
          <td>${OmAdmin.field(r, 'sortOrder')}</td>
        </tr>`).join('');
      tbody.querySelectorAll('tr.om-row-selectable').forEach(tr => {
        tr.addEventListener('click', async () => {
          tbody.querySelectorAll('tr.om-row-selected').forEach(r => r.classList.remove('om-row-selected'));
          tr.classList.add('om-row-selected');
          try {
            const { body: detail } = await OmAdmin.inquiry('menuDetail', { menuId: tr.dataset.menuId });
            fillMenuForm(detail.row || {});
            await loadMenuOptions();
          } catch (e) {
            OmAdmin.showErrorBanner(el, e.message);
          }
        });
      });
    }

    function setTab(tab, el) {
      document.querySelectorAll('.om-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      const usersPanel = document.getElementById('usersPanel');
      const authPanel = document.getElementById('authPanel');
      const menuPanel = document.getElementById('menuPanel');
      const functionPanel = document.getElementById('functionPanel');
      const dataPanel = document.getElementById('dataPanel');
      const head = document.getElementById('tableHead');
      const title = document.getElementById('tabTitle');

      usersPanel.hidden = tab !== 'users';
      authPanel.hidden = tab !== 'auth';
      menuPanel.hidden = tab !== 'menu';
      functionPanel.hidden = tab !== 'function';
      dataPanel.hidden = tab !== 'data';

      if (tab === 'users') {
        title.textContent = '사용자 목록';
        head.innerHTML = '<tr><th>사용자ID</th><th>이름</th><th>지점</th><th>권한그룹</th><th>사용</th><th>최종로그인</th></tr>';
        loadUsers(el).catch(e => OmAdmin.showError(el, e.message));
      } else if (tab === 'auth') {
        title.textContent = '권한그룹 목록';
        head.innerHTML = '<tr><th>그룹ID</th><th>그룹명</th><th>설명</th><th>사용</th></tr>';
        loadAuthGroups(el).catch(e => OmAdmin.showErrorBanner(el, e.message));
      } else if (tab === 'menu') {
        title.textContent = '메뉴 목록';
        head.innerHTML = '<tr><th>메뉴ID</th><th>메뉴명</th><th>URL</th><th>상위메뉴</th><th>정렬</th></tr>';
        loadMenuOptions().then(() => loadMenus(el)).catch(e => OmAdmin.showErrorBanner(el, e.message));
      } else if (tab === 'function') {
        title.textContent = '기능권한 매트릭스';
        head.innerHTML = '<tr><th>권한그룹</th><th>메뉴ID</th><th>메뉴명</th><th>조회</th><th>등록</th><th>수정</th><th>삭제</th><th>다운로드</th></tr>';
        const filterGroup = document.getElementById('filterFaGroup');
        const filterMenu = document.getElementById('filterFaMenu');
        if (filterGroup) filterGroup.value = '';
        if (filterMenu) filterMenu.value = '';
        loadFunctionAuthMenuOptions()
          .then(() => loadFunctionAuths(el))
          .catch(e => OmAdmin.showErrorBanner(el, e.message));
      } else if (tab === 'data') {
        title.textContent = '데이터권한 목록';
        head.innerHTML = '<tr><th>권한그룹</th><th>지점범위</th><th>고객접근</th><th>설명</th></tr>';
        const filterGroup = document.getElementById('filterDaGroup');
        if (filterGroup) filterGroup.value = '';
        loadDataAuths(el).catch(e => OmAdmin.showErrorBanner(el, e.message));
      }
    }
