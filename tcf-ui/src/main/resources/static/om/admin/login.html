<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="/_shared/ui-context.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OM 로그인</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
</head>
<body class="om-login-page">
  <div class="om-login-wrap">
    <div class="om-login-card">
      <div class="om-login-brand">
        <h1>NSIGHT OM</h1>
        <p>운영관리 포털 로그인</p>
      </div>
      <form id="loginForm" class="om-login-form">
        <label for="userId">아이디</label>
        <input id="userId" name="userId" type="text" autocomplete="username" placeholder="admin01" required>

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" required>

        <div id="loginError" class="om-alert error" hidden></div>

        <button type="submit" class="btn-primary om-login-btn">로그인</button>
      </form>

      <div class="om-login-divider" role="separator"><span>또는</span></div>

      <div class="om-login-sso">
        <button type="button" id="ssoLoginBtn" class="btn-secondary om-login-sso-btn">SSO 로그인</button>
        <p class="om-login-sso-hint">SSO 인증 후 OM 세션 + JWT 토큰을 함께 발급합니다. (local: mock IdP)</p>
      </div>

      <p class="om-login-hint">개발용 계정: admin01 / op01 / view01 · 초기 비밀번호 nsight01!</p>
      <p class="om-login-footer"><a href="/index.html">← TCF UI 홈</a></p>
    </div>
  </div>
  <script src="/_shared/om-admin.js?v=20260629a"></script>
  <script>
    (async function () {
      await OmAdmin.loadConfig();
      try {
        const { body } = await OmAdmin.call('authSession', {}, 'INQUIRY');
        if (body.loggedIn) {
          OmAdmin.syncSessionFromBody(body);
          location.href = OmAdmin.uiPath('/om/admin/session.html');
          return;
        }
      } catch (e) {
        /* 세션 없음 */
      }

      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');
      const submitBtn = form.querySelector('button[type="submit"]');
      const ssoBtn = document.getElementById('ssoLoginBtn');

      function showLoginError(err, note) {
        const message = err.message || '로그인에 실패했습니다.';
        errorEl.textContent = message;
        errorEl.hidden = false;
        OmAdmin.showErrorPopup({
          errorMessage: message,
          systemNote: note || 'OM 로그인'
        });
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.hidden = true;
        submitBtn.disabled = true;
        ssoBtn.disabled = true;
        submitBtn.textContent = '로그인 중...';
        try {
          const userId = document.getElementById('userId').value.trim();
          const password = document.getElementById('password').value;
          await OmAdmin.login(userId, password);
          location.href = OmAdmin.uiPath('/om/admin/session.html');
        } catch (err) {
          showLoginError(err, 'OM 로그인');
        } finally {
          submitBtn.disabled = false;
          ssoBtn.disabled = false;
          submitBtn.textContent = '로그인';
        }
      });

      ssoBtn.addEventListener('click', async () => {
        errorEl.hidden = true;
        submitBtn.disabled = true;
        ssoBtn.disabled = true;
        const prevLabel = ssoBtn.textContent;
        ssoBtn.textContent = 'SSO 인증 중...';
        try {
          const userId = document.getElementById('userId').value.trim() || 'admin01';
          await OmAdmin.mockSsoLogin(userId, { channelId: 'WEBTOP' });
          location.href = OmAdmin.uiPath('/om/admin/session.html');
        } catch (err) {
          let message = err.message || 'SSO 로그인에 실패했습니다.';
          if (message.includes('연결') || message.includes('502')) {
            message += ' tcf-om(8097)과 tcf-jwt(8110)이 모두 기동 중인지 확인하세요.';
          }
          showLoginError(err, 'OM SSO 로그인');
          errorEl.textContent = message;
        } finally {
          submitBtn.disabled = false;
          ssoBtn.disabled = false;
          ssoBtn.textContent = prevLabel;
        }
      });
    })();
  </script>
</body>
</html>
