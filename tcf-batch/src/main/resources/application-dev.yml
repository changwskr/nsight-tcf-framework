# dev - ztomcat WAR (batch.war -> /batch)
spring:
  application:
    name: nsight-tcf-batch
  datasource:
    url: jdbc:h2:tcp://127.0.0.1:9092/${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;DATABASE_TO_UPPER=false
    hikari:
      pool-name: nsight-batch-hikari-dev
      initialization-fail-timeout: 120000

nsight:
  gateway:
    mode: dev
    base-url: http://127.0.0.1:8080
  batch:
    startup-collect:
      # batch.war가 알파벳 순 첫 WAR → 나머지 18개 순차 배포(~6분) 후 수집
      initial-delay-ms: 420000
    ap-status:
      targets:
        - { ap-id: cc-ap, ap-name: 'cc-service (/cc)', base-url: '${nsight.gateway.base-url}/cc', enabled: true }
        - { ap-id: ic-ap, ap-name: 'ic-service (/ic)', base-url: '${nsight.gateway.base-url}/ic', enabled: true }
        - { ap-id: pc-ap, ap-name: 'pc-service (/pc)', base-url: '${nsight.gateway.base-url}/pc', enabled: true }
        - { ap-id: bc-ap, ap-name: 'bc-service (/bc)', base-url: '${nsight.gateway.base-url}/bc', enabled: true }
        - { ap-id: ms-ap, ap-name: 'ms-service (/ms)', base-url: '${nsight.gateway.base-url}/ms', enabled: true }
        - { ap-id: sv-ap, ap-name: 'sv-service (/sv)', base-url: '${nsight.gateway.base-url}/sv', enabled: true }
        - { ap-id: pd-ap, ap-name: 'pd-service (/pd)', base-url: '${nsight.gateway.base-url}/pd', enabled: true }
        - { ap-id: cm-ap, ap-name: 'cm-service (/cm)', base-url: '${nsight.gateway.base-url}/cm', enabled: true }
        - { ap-id: eb-ap, ap-name: 'eb-service (/eb)', base-url: '${nsight.gateway.base-url}/eb', enabled: true }
        - { ap-id: ep-ap, ap-name: 'ep-service (/ep)', base-url: '${nsight.gateway.base-url}/ep', enabled: true }
        - { ap-id: bp-ap, ap-name: 'bp-service (/bp)', base-url: '${nsight.gateway.base-url}/bp', enabled: true }
        - { ap-id: bd-ap, ap-name: 'bd-service (/bd)', base-url: '${nsight.gateway.base-url}/bd', enabled: true }
        - { ap-id: ss-ap, ap-name: 'ss-service (/ss)', base-url: '${nsight.gateway.base-url}/ss', enabled: true }
        - { ap-id: cs-ap, ap-name: 'cs-service (/cs)', base-url: '${nsight.gateway.base-url}/cs', enabled: true }
        - { ap-id: ct-ap, ap-name: 'ct-service (/ct)', base-url: '${nsight.gateway.base-url}/ct', enabled: true }
        - { ap-id: mg-ap, ap-name: 'mg-service (/mg)', base-url: '${nsight.gateway.base-url}/mg', enabled: true }
        - { ap-id: om-ap, ap-name: 'tcf-om (/om)', base-url: '${nsight.gateway.base-url}/om', enabled: true }
        - { ap-id: batch-ap, ap-name: 'tcf-batch (/batch)', base-url: '${nsight.gateway.base-url}/batch', enabled: true }
        - { ap-id: ui-ap, ap-name: 'tcf-ui (/ui)', base-url: '${nsight.gateway.base-url}/ui', enabled: true }
    db-status:
      targets:
        - db-id: LOGDB
          db-name: jdbc:h2:file:./data/nsight-txlog/nsight_om
          source-type: jdbc
          jdbc-url: jdbc:h2:tcp://127.0.0.1:9092/${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;DATABASE_TO_UPPER=false
          jdbc-user: sa
          jdbc-password: ""
          enabled: true
        - { db-id: CC-DS, db-name: 'jdbc:h2:mem:nsight_cc', source-type: actuator, base-url: '${nsight.gateway.base-url}/cc', enabled: true }
        - { db-id: IC-DS, db-name: 'jdbc:h2:mem:nsight_ic', source-type: actuator, base-url: '${nsight.gateway.base-url}/ic', enabled: true }
        - { db-id: PC-DS, db-name: 'jdbc:h2:mem:nsight_pc', source-type: actuator, base-url: '${nsight.gateway.base-url}/pc', enabled: true }
        - { db-id: BC-DS, db-name: 'jdbc:h2:mem:nsight_bc', source-type: actuator, base-url: '${nsight.gateway.base-url}/bc', enabled: true }
        - { db-id: MS-DS, db-name: 'jdbc:h2:mem:nsight_ms', source-type: actuator, base-url: '${nsight.gateway.base-url}/ms', enabled: true }
        - { db-id: SV-DS, db-name: 'jdbc:h2:mem:nsight_sv', source-type: actuator, base-url: '${nsight.gateway.base-url}/sv', enabled: true }
        - { db-id: PD-DS, db-name: 'jdbc:h2:mem:nsight_pd', source-type: actuator, base-url: '${nsight.gateway.base-url}/pd', enabled: true }
        - { db-id: CM-DS, db-name: 'jdbc:h2:mem:nsight_cm', source-type: actuator, base-url: '${nsight.gateway.base-url}/cm', enabled: true }
        - { db-id: EB-DS, db-name: 'jdbc:h2:mem:nsight_eb', source-type: actuator, base-url: '${nsight.gateway.base-url}/eb', enabled: true }
        - { db-id: EP-DS, db-name: 'jdbc:h2:mem:nsight_ep', source-type: actuator, base-url: '${nsight.gateway.base-url}/ep', enabled: true }
        - { db-id: BP-DS, db-name: 'jdbc:h2:mem:nsight_bp', source-type: actuator, base-url: '${nsight.gateway.base-url}/bp', enabled: true }
        - { db-id: BD-DS, db-name: 'jdbc:h2:mem:nsight_bd', source-type: actuator, base-url: '${nsight.gateway.base-url}/bd', enabled: true }
        - { db-id: SS-DS, db-name: 'jdbc:h2:mem:nsight_ss', source-type: actuator, base-url: '${nsight.gateway.base-url}/ss', enabled: true }
        - { db-id: CS-DS, db-name: 'jdbc:h2:mem:nsight_cs', source-type: actuator, base-url: '${nsight.gateway.base-url}/cs', enabled: true }
        - { db-id: CT-DS, db-name: 'jdbc:h2:mem:nsight_ct', source-type: actuator, base-url: '${nsight.gateway.base-url}/ct', enabled: true }
        - { db-id: MG-DS, db-name: 'jdbc:h2:mem:nsight_mg', source-type: actuator, base-url: '${nsight.gateway.base-url}/mg', enabled: true }
        - { db-id: OM-DS, db-name: 'jdbc:h2:file:./data/nsight-txlog/nsight_om', source-type: actuator, base-url: '${nsight.gateway.base-url}/om', enabled: true }
        - { db-id: BATCH-DS, db-name: 'jdbc:h2:file:./data/nsight-txlog/nsight_om', source-type: actuator, base-url: '${nsight.gateway.base-url}/batch', enabled: true }
        - { db-id: UI-DS, db-name: '(no datasource)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ui', enabled: true }
    deploy-status:
      targets:
