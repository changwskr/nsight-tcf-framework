# ztomcat (:8080) WAR — batch.war → /batch, 수집 대상은 게이트웨이 context 경로
spring:
  config:
    activate:
      on-profile: tomcat

nsight:
  gateway:
    mode: tomcat
    base-url: http://127.0.0.1:8080
  batch:
    startup-collect:
      # batch.war가 알파벳 순 첫 WAR → 나머지 18개 순차 배포(~6분) 후 수집
      initial-delay-ms: 420000
    ap-status:
      targets:
        - { ap-id: cc-ap, ap-name: 'cc-service (/cc)', base-url: '${nsight.gateway.base-url}/cc', enabled: true }
        - { ap-id: ic-ap, ap-name: 'ic-service (/ic)', base-url: '${nsight.gateway.base-url}/ic', enabled: true }
        - { ap-id: pc-ap, ap-name: 'pc-service (/pc)', base-url: '${nsight.gateway.base-url}/pc', enabled: true }
        - { ap-id: bc-ap, ap-name: 'bc-service (/bc)', base-url: '${nsight.gateway.base-url}/bc', enabled: true }
        - { ap-id: ms-ap, ap-name: 'ms-service (/ms)', base-url: '${nsight.gateway.base-url}/ms', enabled: true }
        - { ap-id: sv-ap, ap-name: 'sv-service (/sv)', base-url: '${nsight.gateway.base-url}/sv', enabled: true }
        - { ap-id: pd-ap, ap-name: 'pd-service (/pd)', base-url: '${nsight.gateway.base-url}/pd', enabled: true }
        - { ap-id: cm-ap, ap-name: 'cm-service (/cm)', base-url: '${nsight.gateway.base-url}/cm', enabled: true }
        - { ap-id: eb-ap, ap-name: 'eb-service (/eb)', base-url: '${nsight.gateway.base-url}/eb', enabled: true }
        - { ap-id: ep-ap, ap-name: 'ep-service (/ep)', base-url: '${nsight.gateway.base-url}/ep', enabled: true }
        - { ap-id: bp-ap, ap-name: 'bp-service (/bp)', base-url: '${nsight.gateway.base-url}/bp', enabled: true }
        - { ap-id: bd-ap, ap-name: 'bd-service (/bd)', base-url: '${nsight.gateway.base-url}/bd', enabled: true }
        - { ap-id: ss-ap, ap-name: 'ss-service (/ss)', base-url: '${nsight.gateway.base-url}/ss', enabled: true }
        - { ap-id: cs-ap, ap-name: 'cs-service (/cs)', base-url: '${nsight.gateway.base-url}/cs', enabled: true }
        - { ap-id: ct-ap, ap-name: 'ct-service (/ct)', base-url: '${nsight.gateway.base-url}/ct', enabled: true }
        - { ap-id: mg-ap, ap-name: 'mg-service (/mg)', base-url: '${nsight.gateway.base-url}/mg', enabled: true }
        - { ap-id: om-ap, ap-name: 'tcf-om (/om)', base-url: '${nsight.gateway.base-url}/om', enabled: true }
        - { ap-id: batch-ap, ap-name: 'tcf-batch (/batch)', base-url: '${nsight.gateway.base-url}/batch', enabled: true }
        - { ap-id: ui-ap, ap-name: 'tcf-ui (/ui)', base-url: '${nsight.gateway.base-url}/ui', enabled: true }
    db-status:
      targets:
        - db-id: LOGDB
          db-name: nsight_om H2 (공유 JDBC ping)
          source-type: jdbc
          jdbc-url: jdbc:h2:file:${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=false
          jdbc-user: sa
          jdbc-password: ""
          enabled: true
        - { db-id: CC-DS, db-name: 'nsight_cc (cc-service /cc)', source-type: actuator, base-url: '${nsight.gateway.base-url}/cc', enabled: true }
        - { db-id: IC-DS, db-name: 'nsight_ic (ic-service /ic)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ic', enabled: true }
        - { db-id: PC-DS, db-name: 'nsight_pc (pc-service /pc)', source-type: actuator, base-url: '${nsight.gateway.base-url}/pc', enabled: true }
        - { db-id: BC-DS, db-name: 'nsight_bc (bc-service /bc)', source-type: actuator, base-url: '${nsight.gateway.base-url}/bc', enabled: true }
        - { db-id: MS-DS, db-name: 'nsight_ms (ms-service /ms)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ms', enabled: true }
        - { db-id: SV-DS, db-name: 'nsight_sv (sv-service /sv)', source-type: actuator, base-url: '${nsight.gateway.base-url}/sv', enabled: true }
        - { db-id: PD-DS, db-name: 'nsight_pd (pd-service /pd)', source-type: actuator, base-url: '${nsight.gateway.base-url}/pd', enabled: true }
        - { db-id: CM-DS, db-name: 'nsight_cm (cm-service /cm)', source-type: actuator, base-url: '${nsight.gateway.base-url}/cm', enabled: true }
        - { db-id: EB-DS, db-name: 'nsight_eb (eb-service /eb)', source-type: actuator, base-url: '${nsight.gateway.base-url}/eb', enabled: true }
        - { db-id: EP-DS, db-name: 'nsight_ep (ep-service /ep)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ep', enabled: true }
        - { db-id: BP-DS, db-name: 'nsight_bp (bp-service /bp)', source-type: actuator, base-url: '${nsight.gateway.base-url}/bp', enabled: true }
        - { db-id: BD-DS, db-name: 'nsight_bd (bd-service /bd)', source-type: actuator, base-url: '${nsight.gateway.base-url}/bd', enabled: true }
        - { db-id: SS-DS, db-name: 'nsight_ss (ss-service /ss)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ss', enabled: true }
        - { db-id: CS-DS, db-name: 'nsight_cs (cs-service /cs)', source-type: actuator, base-url: '${nsight.gateway.base-url}/cs', enabled: true }
        - { db-id: CT-DS, db-name: 'nsight_ct (ct-service /ct)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ct', enabled: true }
        - { db-id: MG-DS, db-name: 'nsight_mg (mg-service /mg)', source-type: actuator, base-url: '${nsight.gateway.base-url}/mg', enabled: true }
        - { db-id: OM-DS, db-name: 'nsight_om (tcf-om /om)', source-type: actuator, base-url: '${nsight.gateway.base-url}/om', enabled: true }
        - { db-id: BATCH-DS, db-name: 'nsight_batch (tcf-batch /batch)', source-type: actuator, base-url: '${nsight.gateway.base-url}/batch', enabled: true }
        - { db-id: UI-DS, db-name: 'tcf-ui (/ui)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ui', enabled: true }
    session-status:
      targets:
        - scope-id: OM-PORTAL
          scope-name: OM 운영 포털 (Spring Session)
          source-type: spring-session
          enabled: true
        - { scope-id: CC-AP, scope-name: 'cc-service HTTP Session (/cc)', source-type: actuator, base-url: '${nsight.gateway.base-url}/cc', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: IC-AP, scope-name: 'ic-service HTTP Session (/ic)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ic', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: PC-AP, scope-name: 'pc-service HTTP Session (/pc)', source-type: actuator, base-url: '${nsight.gateway.base-url}/pc', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: BC-AP, scope-name: 'bc-service HTTP Session (/bc)', source-type: actuator, base-url: '${nsight.gateway.base-url}/bc', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: MS-AP, scope-name: 'ms-service HTTP Session (/ms)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ms', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: SV-AP, scope-name: 'sv-service HTTP Session (/sv)', source-type: actuator, base-url: '${nsight.gateway.base-url}/sv', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: PD-AP, scope-name: 'pd-service HTTP Session (/pd)', source-type: actuator, base-url: '${nsight.gateway.base-url}/pd', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: CM-AP, scope-name: 'cm-service HTTP Session (/cm)', source-type: actuator, base-url: '${nsight.gateway.base-url}/cm', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: EB-AP, scope-name: 'eb-service HTTP Session (/eb)', source-type: actuator, base-url: '${nsight.gateway.base-url}/eb', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: EP-AP, scope-name: 'ep-service HTTP Session (/ep)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ep', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: BP-AP, scope-name: 'bp-service HTTP Session (/bp)', source-type: actuator, base-url: '${nsight.gateway.base-url}/bp', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: BD-AP, scope-name: 'bd-service HTTP Session (/bd)', source-type: actuator, base-url: '${nsight.gateway.base-url}/bd', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: SS-AP, scope-name: 'ss-service HTTP Session (/ss)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ss', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: CS-AP, scope-name: 'cs-service HTTP Session (/cs)', source-type: actuator, base-url: '${nsight.gateway.base-url}/cs', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: CT-AP, scope-name: 'ct-service HTTP Session (/ct)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ct', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: MG-AP, scope-name: 'mg-service HTTP Session (/mg)', source-type: actuator, base-url: '${nsight.gateway.base-url}/mg', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: BATCH-AP, scope-name: 'tcf-batch HTTP Session (/batch)', source-type: actuator, base-url: '${nsight.gateway.base-url}/batch', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: UI-AP, scope-name: 'tcf-ui HTTP Session (/ui)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ui', metric-name: tomcat.sessions.active.current, enabled: true }
