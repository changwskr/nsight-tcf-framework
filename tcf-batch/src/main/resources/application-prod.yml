# prod - production Tomcat WAR (batch.war -> /batch)
spring:
  application:
    name: nsight-tcf-batch
  datasource:
    url: ${NSIGHT_BATCH_DB_URL:jdbc:oracle:thin:@//localhost:1521/nsight_om}
    username: ${NSIGHT_BATCH_DB_USER:}
    password: ${NSIGHT_BATCH_DB_PASSWORD:}
    driver-class-name: ${NSIGHT_BATCH_DB_DRIVER:oracle.jdbc.OracleDriver}
    hikari:
      pool-name: nsight-batch-hikari-prod

nsight:
  gateway:
    base-url: ${NSIGHT_GATEWAY_BASE_URL:https://marketing.example.com}
