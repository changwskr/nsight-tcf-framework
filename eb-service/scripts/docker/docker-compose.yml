# eb-service compose
#
# From this directory:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
#
# Or use helper:
#   docker-compose.bat up -d --build

name: nsight-eb

services:
  eb-service:
    container_name: nsight-eb
    image: ${IMAGE_TAG:-nsight-eb:local}
    build:
      context: ../../..
      dockerfile: eb-service/scripts/docker/Dockerfile
    ports:
      - "${HOST_PORT:-8089}:8089"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SERVER_PORT: "8089"
      NSIGHT_EB_EVENT_PUBLISH_EP_ONLINE_URL: ${EP_ONLINE_URL:-http://host.docker.internal:8090/ep/online}
      NSIGHT_TXLOG_PATH: /app/data/nsight-txlog
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8}
    volumes:
      - nsight-eb-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8089/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  nsight-eb-data:
    name: nsight-eb-data
