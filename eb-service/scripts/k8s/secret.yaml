# eb-service Secret — credentials and sensitive values
#
# Replace CHANGE_ME values before apply (or create via kubectl/sealed-secrets).
#
# Apply:
#   kubectl apply -f eb-service/scripts/k8s/secret.yaml
#
# Prefer (not committing real secrets):
#   kubectl -n nsight create secret generic nsight-eb-secret \
#     --from-literal=NSIGHT_EB_DB_USER=ebuser \
#     --from-literal=NSIGHT_EB_DB_PASSWORD='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: nsight-eb-secret
  namespace: nsight
  labels:
    app: nsight-eb
    app.kubernetes.io/name: eb-service
    app.kubernetes.io/part-of: nsight-tcf-framework
type: Opaque
stringData:
  # Business DB (application-prod.yml)
  NSIGHT_EB_DB_USER: "CHANGE_ME"
  NSIGHT_EB_DB_PASSWORD: "CHANGE_ME"
  # Transaction log DB
  NSIGHT_TXLOG_DB_USER: "sa"
  NSIGHT_TXLOG_DB_PASSWORD: ""
  # Optional: override EP URL if it embeds credentials (prefer ConfigMap otherwise)
  # NSIGHT_EB_EVENT_PUBLISH_EP_ONLINE_URL: "http://nsight-ep:8090/ep/online"
