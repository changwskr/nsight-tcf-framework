# local - bootRun (port 8089)
server:
  port: 8089

spring:
  application:
    name: nsight-eb-service
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  datasource:
    url: jdbc:h2:mem:nsight_eb;MODE=Oracle;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    hikari:
      pool-name: nsight-eb-hikari-local
  h2:
    console:
      enabled: true

nsight:
  tcf:
    transaction-log-schema-auto-init: true
    transaction-log-datasource:
      url: jdbc:h2:file:${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=false
      username: sa
      password:
      driver-class-name: org.h2.Driver
  eb:
    event-publish:
      enabled: true
      fixed-delay-ms: 60000
      batch-size: 50
      ep-online-url: http://127.0.0.1:8090/ep/online