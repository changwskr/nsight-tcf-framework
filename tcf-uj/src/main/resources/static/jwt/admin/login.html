<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="/_shared/uj-context.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT 로그인</title>
  <link rel="stylesheet" href="/_shared/online.css">
  <link rel="stylesheet" href="/_shared/om-admin.css">
  <link rel="stylesheet" href="/_shared/jwt-admin.css">
</head>
<body class="om-login-page jwt-login-page">
  <div class="om-login-wrap">
    <div class="om-login-card">
      <div class="om-login-brand">
        <h1>NSIGHT JWT</h1>
        <p>JWT 인증 · Access / Refresh Token 발급</p>
      </div>
      <form id="loginForm" class="om-login-form">
        <label for="userId">아이디</label>
        <input id="userId" name="userId" type="text" autocomplete="username" placeholder="admin01" required>

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" required>

        <div id="loginError" class="om-alert error" hidden></div>

        <button type="submit" class="btn-primary om-login-btn">토큰 발급</button>
      </form>
      <p class="om-login-hint">개발용 계정: admin01 · 초기 비밀번호 nsight01!</p>
      <p class="om-login-footer">
        <a href="/jwt/index-multi.html">API 거래 테스트</a> ·
        <a href="/index.html">← TCF UI 홈</a>
      </p>
    </div>
  </div>
  <script src="/_shared/jwt-admin.js?v=20260628b"></script>
  <script>
    (async function () {
      await JwtAdmin.loadConfig();
      const session = JwtAdmin.getSession();
      if (session && session.accessToken) {
        location.href = JwtAdmin.uiPath('/jwt/admin/token.html');
        return;
      }

      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');
      const submitBtn = form.querySelector('button[type="submit"]');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.hidden = true;
        submitBtn.disabled = true;
        submitBtn.textContent = '발급 중...';
        try {
          const userId = document.getElementById('userId').value.trim();
          const password = document.getElementById('password').value;
          await JwtAdmin.login(userId, password);
          location.href = JwtAdmin.uiPath('/jwt/admin/token.html');
        } catch (err) {
          errorEl.textContent = err.message || '로그인에 실패했습니다.';
          errorEl.hidden = false;
          JwtAdmin.showErrorPopup({
            errorMessage: err.message || '로그인에 실패했습니다.',
            systemNote: 'JWT 로그인'
          });
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '토큰 발급';
        }
      });
    })();
  </script>
</body>
</html>
