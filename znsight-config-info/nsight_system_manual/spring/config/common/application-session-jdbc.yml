# ============================================================
# NSIGHT Spring Session JDBC 설정
# Redis 미사용 / JDBC 기반 세션 공유
# ============================================================

server:
  servlet:
    session:
      timeout: 60m
      tracking-modes: cookie
      cookie:
        name: JSESSIONID
        path: /
        http-only: true
        secure: true
        same-site: Lax

spring:
  session:
    store-type: jdbc
    timeout: 60m
    jdbc:
      table-name: SPRING_SESSION
      initialize-schema: never
      cleanup-cron: "0 */5 * * * *"

nsight:
  session:
    type: spring-session-jdbc
    idle-timeout-minutes: 60
    absolute-timeout-hours: 8
    cookie-name: JSESSIONID
    cookie-path: /
    session-db: sessiondb
    replication:
      type: jdbc
      tomcat-deltamanager-enabled: false
    allow-session-attributes:
      - loginUser
      - userId
      - branchId
      - roleId
      - authLevel
      - maskingLevel
      - centerId
    deny-session-attributes:
      - customerList
      - campaignTargetList
      - largeSearchResult
      - fileContent
      - excelData
