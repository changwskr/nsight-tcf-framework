# ============================================================
# NSIGHT Apache Logging
# GUID / TraceId / Route / Response Time 포함
# ============================================================

LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" guid=%{X-GUID}i trace=%{X-Trace-Id}i route=%{BALANCER_WORKER_ROUTE}e rt=%D" nsight_combined

CustomLog logs/access.log nsight_combined
ErrorLog  logs/error.log
