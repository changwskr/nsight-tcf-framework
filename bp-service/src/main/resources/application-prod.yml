# prod - production Tomcat WAR (/bp)
spring:
  application:
    name: nsight-bp-service
  datasource:
    url: ${NSIGHT_BP_DB_URL:jdbc:oracle:thin:@//localhost:1521/nsight_bp}
    username: ${NSIGHT_BP_DB_USER:}
    password: ${NSIGHT_BP_DB_PASSWORD:}
    driver-class-name: ${NSIGHT_BP_DB_DRIVER:oracle.jdbc.OracleDriver}
    hikari:
      pool-name: nsight-bp-hikari-prod
  h2:
    console:
      enabled: false

nsight:
  tcf:
    transaction-log-schema-auto-init: false
    transaction-log-datasource:
      url: ${NSIGHT_TXLOG_JDBC_URL:jdbc:h2:file:${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=false}
      username: ${NSIGHT_TXLOG_DB_USER:sa}
      password: ${NSIGHT_TXLOG_DB_PASSWORD:}
      driver-class-name: ${NSIGHT_TXLOG_DB_DRIVER:org.h2.Driver}