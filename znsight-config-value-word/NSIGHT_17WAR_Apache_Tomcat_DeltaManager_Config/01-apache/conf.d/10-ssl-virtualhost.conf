<VirtualHost *:80>
    ServerName nh.marketing.com
    RewriteEngine On
    RewriteRule ^/(.*)$ https://nh.marketing.com/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName nh.marketing.com

    SSLEngine on
    SSLCertificateFile      /etc/pki/tls/certs/nh.marketing.com.crt
    SSLCertificateKeyFile   /etc/pki/tls/private/nh.marketing.com.key
    SSLCertificateChainFile /etc/pki/tls/certs/nh-chain.crt

    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyAddHeaders On

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "nh.marketing.com"

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    IncludeOptional conf.d/20-proxy-balancer-17war.conf
    IncludeOptional conf.d/40-security-headers.conf

    ErrorLog  logs/nsight_ssl_error.log
    CustomLog logs/nsight_ssl_access.log nsight_json
</VirtualHost>
