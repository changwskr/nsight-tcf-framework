# dev - ztomcat WAR (batch.war -> /batch)
spring:
  application:
    name: nsight-tcf-batch
  datasource:
    url: jdbc:h2:tcp://127.0.0.1:9092/${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;DATABASE_TO_UPPER=false
    hikari:
      pool-name: nsight-batch-hikari-dev
      initialization-fail-timeout: 120000

nsight:
  gateway:
    mode: dev
    base-url: http://127.0.0.1:8080
  batch:
    startup-collect:
      # batch.war가 알파벳 순 첫 WAR → 나머지 11개 순차 배포 후 수집
      initial-delay-ms: 300000
    ap-status:
      targets:
        - { ap-id: ic-ap, ap-name: 'ic-service (/ic)', base-url: '${nsight.gateway.base-url}/ic', enabled: true }
        - { ap-id: pc-ap, ap-name: 'pc-service (/pc)', base-url: '${nsight.gateway.base-url}/pc', enabled: true }
        - { ap-id: ms-ap, ap-name: 'ms-service (/ms)', base-url: '${nsight.gateway.base-url}/ms', enabled: true }
        - { ap-id: sv-ap, ap-name: 'sv-service (/sv)', base-url: '${nsight.gateway.base-url}/sv', enabled: true }
        - { ap-id: pd-ap, ap-name: 'pd-service (/pd)', base-url: '${nsight.gateway.base-url}/pd', enabled: true }
        - { ap-id: eb-ap, ap-name: 'eb-service (/eb)', base-url: '${nsight.gateway.base-url}/eb', enabled: true }
        - { ap-id: ep-ap, ap-name: 'ep-service (/ep)', base-url: '${nsight.gateway.base-url}/ep', enabled: true }
        - { ap-id: ss-ap, ap-name: 'ss-service (/ss)', base-url: '${nsight.gateway.base-url}/ss', enabled: true }
        - { ap-id: mg-ap, ap-name: 'mg-service (/mg)', base-url: '${nsight.gateway.base-url}/mg', enabled: true }
        - { ap-id: om-ap, ap-name: 'tcf-om (/om)', base-url: '${nsight.gateway.base-url}/om', enabled: true }
        - { ap-id: batch-ap, ap-name: 'tcf-batch (/batch)', base-url: '${nsight.gateway.base-url}/batch', enabled: true }
        - { ap-id: ui-ap, ap-name: 'tcf-ui (/ui)', base-url: '${nsight.gateway.base-url}/ui', enabled: true }
    db-status:
      targets:
        - db-id: LOGDB
          db-name: jdbc:h2:file:./data/nsight-txlog/nsight_om
          source-type: jdbc
          jdbc-url: jdbc:h2:tcp://127.0.0.1:9092/${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;DATABASE_TO_UPPER=false
          jdbc-user: sa
          jdbc-password: ""
          enabled: true
        - { db-id: IC-DS, db-name: 'jdbc:h2:mem:nsight_ic', source-type: actuator, base-url: '${nsight.gateway.base-url}/ic', enabled: true }
        - { db-id: PC-DS, db-name: 'jdbc:h2:mem:nsight_pc', source-type: actuator, base-url: '${nsight.gateway.base-url}/pc', enabled: true }
        - { db-id: MS-DS, db-name: 'jdbc:h2:mem:nsight_ms', source-type: actuator, base-url: '${nsight.gateway.base-url}/ms', enabled: true }
        - { db-id: SV-DS, db-name: 'jdbc:h2:mem:nsight_sv', source-type: actuator, base-url: '${nsight.gateway.base-url}/sv', enabled: true }
        - { db-id: PD-DS, db-name: 'jdbc:h2:mem:nsight_pd', source-type: actuator, base-url: '${nsight.gateway.base-url}/pd', enabled: true }
        - { db-id: EB-DS, db-name: 'jdbc:h2:mem:nsight_eb', source-type: actuator, base-url: '${nsight.gateway.base-url}/eb', enabled: true }
        - { db-id: EP-DS, db-name: 'jdbc:h2:mem:nsight_ep', source-type: actuator, base-url: '${nsight.gateway.base-url}/ep', enabled: true }
        - { db-id: SS-DS, db-name: 'jdbc:h2:mem:nsight_ss', source-type: actuator, base-url: '${nsight.gateway.base-url}/ss', enabled: true }
        - { db-id: MG-DS, db-name: 'jdbc:h2:mem:nsight_mg', source-type: actuator, base-url: '${nsight.gateway.base-url}/mg', enabled: true }
        - { db-id: OM-DS, db-name: 'jdbc:h2:file:./data/nsight-txlog/nsight_om', source-type: actuator, base-url: '${nsight.gateway.base-url}/om', enabled: true }
        - { db-id: BATCH-DS, db-name: 'jdbc:h2:file:./data/nsight-txlog/nsight_om', source-type: actuator, base-url: '${nsight.gateway.base-url}/batch', enabled: true }
        - { db-id: UI-DS, db-name: '(no datasource)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ui', enabled: true }
    session-status:
      targets:
        - scope-id: OM-PORTAL
          scope-name: OM 운영 포털 (Spring Session)
          source-type: spring-session
          enabled: true
        - { scope-id: IC-AP, scope-name: 'ic-service HTTP Session (/ic)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ic', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: PC-AP, scope-name: 'pc-service HTTP Session (/pc)', source-type: actuator, base-url: '${nsight.gateway.base-url}/pc', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: MS-AP, scope-name: 'ms-service HTTP Session (/ms)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ms', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: SV-AP, scope-name: 'sv-service HTTP Session (/sv)', source-type: actuator, base-url: '${nsight.gateway.base-url}/sv', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: PD-AP, scope-name: 'pd-service HTTP Session (/pd)', source-type: actuator, base-url: '${nsight.gateway.base-url}/pd', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: EB-AP, scope-name: 'eb-service HTTP Session (/eb)', source-type: actuator, base-url: '${nsight.gateway.base-url}/eb', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: EP-AP, scope-name: 'ep-service HTTP Session (/ep)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ep', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: SS-AP, scope-name: 'ss-service HTTP Session (/ss)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ss', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: MG-AP, scope-name: 'mg-service HTTP Session (/mg)', source-type: actuator, base-url: '${nsight.gateway.base-url}/mg', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: BATCH-AP, scope-name: 'tcf-batch HTTP Session (/batch)', source-type: actuator, base-url: '${nsight.gateway.base-url}/batch', metric-name: tomcat.sessions.active.current, enabled: true }
        - { scope-id: UI-AP, scope-name: 'tcf-ui HTTP Session (/ui)', source-type: actuator, base-url: '${nsight.gateway.base-url}/ui', metric-name: tomcat.sessions.active.current, enabled: true }
    deploy-status:
      targets:
        - business-code: IC
          war-name: ic.war
          base-url: ${nsight.gateway.base-url}/ic
          source-type: actuator
          enabled: true
        - business-code: PC
          war-name: pc.war
          base-url: ${nsight.gateway.base-url}/pc
          source-type: actuator
          enabled: true
        - business-code: MS
          war-name: ms.war
          base-url: ${nsight.gateway.base-url}/ms
          source-type: actuator
          enabled: true
        - business-code: SV
          war-name: sv.war
          base-url: ${nsight.gateway.base-url}/sv
          source-type: actuator
          enabled: true
        - business-code: PD
          war-name: pd.war
          base-url: ${nsight.gateway.base-url}/pd
          source-type: actuator
          enabled: true
        - business-code: EB
          war-name: eb.war
          base-url: ${nsight.gateway.base-url}/eb
          source-type: actuator
          enabled: true
        - business-code: EP
          war-name: ep.war
          base-url: ${nsight.gateway.base-url}/ep
          source-type: actuator
          enabled: true
        - business-code: SS
          war-name: ss.war
          base-url: ${nsight.gateway.base-url}/ss
          source-type: actuator
          enabled: true
        - business-code: MG
          war-name: mg.war
          base-url: ${nsight.gateway.base-url}/mg
          source-type: actuator
          enabled: true
        - business-code: OM
          war-name: om.war
          base-url: ${nsight.gateway.base-url}/om
          source-type: actuator
          enabled: true
        - business-code: BATCH
          war-name: batch.war
          base-url: ${nsight.gateway.base-url}/batch
          source-type: actuator
          enabled: true
        - business-code: UI
          war-name: ui.war
          base-url: ${nsight.gateway.base-url}/ui
          source-type: actuator
          enabled: true
