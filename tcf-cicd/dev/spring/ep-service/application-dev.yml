# dev - ztomcat WAR (/ep)
spring:
  application:
    name: nsight-ep-service
  datasource:
    url: jdbc:h2:tcp://127.0.0.1:9092/./nsight_om;MODE=Oracle;DATABASE_TO_UPPER=false
    hikari:
      pool-name: nsight-ep-hikari-dev
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      continue-on-error: true
      encoding: UTF-8
      schema-locations: classpath:schema.sql

nsight:
  tcf:
    transaction-log-schema-auto-init: true
    transaction-log-datasource:
      separate: false
      url: jdbc:h2:tcp://127.0.0.1:9092/./nsight_om;MODE=Oracle;DATABASE_TO_UPPER=false
      username: sa
      password:
      driver-class-name: org.h2.Driver
