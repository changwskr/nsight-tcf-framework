# local - bootRun (:8098, context-path /batch)
server:
  port: 8098
  servlet:
    context-path: /batch

spring:
  application:
    name: nsight-tcf-batch
  datasource:
    url: jdbc:h2:file:${nsight.txlog.path:./data/nsight-txlog}/nsight_om;MODE=Oracle;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=false
    hikari:
      pool-name: nsight-batch-hikari-local

nsight:
  gateway:
    mode: local
  batch:
    ap-status:
      targets:
        - ap-id: om-ap
          ap-name: tcf-om (:8097)
          base-url: http://127.0.0.1:8097
          enabled: true
        - ap-id: ui-ap
          ap-name: tcf-ui (:8099)
          base-url: http://127.0.0.1:8099
          enabled: true
        - ap-id: batch-ap
          ap-name: tcf-batch (:8098/batch)
          base-url: http://127.0.0.1:8098/batch
          enabled: true
        - ap-id: sv-ap
          ap-name: sv-service (:8086)
          base-url: http://127.0.0.1:8086
          enabled: false
        - ap-id: mg-ap
          ap-name: mg-service (:8096)
          base-url: http://127.0.0.1:8096
          enabled: false
    db-status:
      targets:
        - db-id: OM-DS
          db-name: OM H2 (nsight_om)
          source-type: actuator
          base-url: http://127.0.0.1:8097
          enabled: true
        - db-id: SV-DS
          db-name: jdbc:h2:mem:nsight_sv
          source-type: actuator
          base-url: http://127.0.0.1:8086
          enabled: false
    session-status:
      targets:
        - scope-id: OM-PORTAL
          scope-name: OM 운영 포털 (Spring Session)
          source-type: spring-session
          enabled: true
        - scope-id: SV-AP
          scope-name: sv-service Tomcat Session
          source-type: actuator
          base-url: http://127.0.0.1:8086
          metric-name: tomcat.sessions.active.current
          enabled: false
    deploy-status:
      targets:
        - business-code: OM
          war-name: tcf-om.war
          base-url: http://127.0.0.1:8097
          source-type: actuator
          enabled: true
        - business-code: UI
          war-name: tcf-ui.war
          base-url: http://127.0.0.1:8099
          source-type: actuator
          enabled: true
        - business-code: BATCH
          war-name: tcf-batch.war
          base-url: http://127.0.0.1:8098/batch
          source-type: actuator
          enabled: true
        - business-code: SV
          war-name: sv.war
          base-url: http://127.0.0.1:8086
          source-type: actuator
          enabled: false
        - business-code: MG
          war-name: mg.war
          base-url: http://127.0.0.1:8096
          source-type: actuator
          enabled: false
